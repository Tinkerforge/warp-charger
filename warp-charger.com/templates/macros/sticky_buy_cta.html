{#
    Sticky bottom-right Buy/Configure CTA pill.

    Parameters:
        name      : product name shown on the left
        price     : price label shown on the right ("ab 842€")
        cta_label : button label
        cta_url   : optional href; if absent, a <button> is rendered
        aria_label: label for the wrapping aside
#}

{% macro sticky_buy_cta(name, price, cta_label, cta_url=None, aria_label=None) %}
<aside aria-label="{{ aria_label or name }}" data-sticky-cta class="fixed right-6 bottom-6 left-6 z-40 md:left-auto md:w-72">
    <div class="rounded-[18px] liquid-glass bg-white/10 p-1.25 shadow-[0px_0px_29.43px_6.3px_rgba(0,0,0,0.2)]">
        <div class="flex flex-col gap-2.5 rounded-[13px] bg-linear-to-b from-white from-19% to-[#f5f5f5] to-85% p-2.5">
            <div class="flex w-full items-baseline justify-between">
                <p class="font-satoshi text-xl font-medium tracking-[-0.2px] text-black">{{ name }}</p>
                <p class="font-satoshi text-xl font-medium tracking-[-1.2px] text-grey">{{ price }}</p>
            </div>
            {% if cta_url %}
            <a href="{{ cta_url }}" class="btn-primary w-full text-center">{{ cta_label }}</a>
            {% else %}
            <button type="button" class="btn-primary w-full">{{ cta_label }}</button>
            {% endif %}
        </div>
    </div>
</aside>
{% endmacro %}
