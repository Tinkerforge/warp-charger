{% extends "page_base.html" %}

{% block extra_head %}
{# LCP optimization: the hero <video> poster is the Largest Contentful Paint
   image, but <video poster> can't take fetchpriority and the browser's preload
   scanner deprioritizes poster images. Preload the matching poster per
   breakpoint (Tailwind md = 768px: mobile video shows <768px, desktop >=768px)
   so it is discoverable in the initial HTML and fetched at high priority.
   Using url_for keeps the URL (incl. the ?v= cache-bust) identical to the
   poster attribute, so the preloaded image is reused rather than refetched. #}
<link rel="preload" as="image" fetchpriority="high" media="(max-width: 767.98px)"
      href="{{ url_for('static', filename='images/warp4-hero-mobile-poster.webp') }}" />
<link rel="preload" as="image" fetchpriority="high" media="(min-width: 768px)"
      href="{{ url_for('static', filename='images/warp4-hero-desktop-poster.webp') }}" />
{% endblock %}

{% from "macros/compatibility_diagram.html" import compatibility_diagram %}

    {"title": t.products.card2_title, "url": t.products.card2_url, "desc": t.products.card2_desc, "image": "warp-charger-stand.webp", "image_alt": "WARP4 Charging Stand"},
    {"title": t.products.card3_title, "url": t.products.card3_url, "desc": t.products.card3_desc, "image": "energy-manager-2.webp", "image_alt": "WARP Energy Manager"},

{# Philosophy / Bento Grid #}
{% from "macros/bento_grid.html" import bento_grid %}
{% call bento_grid(t.philosophy) %}
    <!-- Row 1 -->
    <div class="flex flex-col items-stretch gap-2.5 sm:gap-[20px] md:flex-row">
        <a href="{{ '/de/ueber-uns/unternehmen#made-in-germany' if lang == 'de' else '/en/about/company#made-in-germany' }}" class="group relative block h-71.25 w-full min-w-full overflow-hidden rounded-xl sm:h-93.75 sm:min-w-70 md:flex-2 lg:flex-1">
            <img alt="{{ t.philosophy.made_in_germany }}" loading="lazy" class="absolute inset-0 h-full w-full rounded-xl object-cover transition-transform duration-300 group-hover:scale-105" src="{{ url_for('static', filename='images/germany-background.webp') }}" />
            <div class="relative h-full w-full overflow-clip rounded-[inherit]">
                <h3 class="absolute top-7 right-7 text-right text-h3 text-black">{{ t.philosophy.made_in_germany }}</h3>
            </div>
            <div aria-hidden="true" class="pointer-events-none absolute inset-0 rounded-xl border border-[rgba(255,255,255,0.8)]"></div>
        </a>
        <article class="relative h-71.25 w-full min-w-full overflow-hidden rounded-xl sm:h-93.75 sm:min-w-70 md:flex-1">
            <img alt="Open Source" loading="lazy" class="absolute inset-0 h-full w-full rounded-xl object-cover" src="{{ url_for('static', filename='images/crypto-background.webp') }}" />
            <div class="absolute right-[6%] left-[6%] flex h-full flex-col items-center justify-center gap-4">
                <header class="flex items-center gap-2">
                    <img src="{{ url_for('static', filename='images/open-source.svg') }}" loading="lazy" alt="Open Source" class="h-8 w-8 object-contain" />
                    <h3 class="relative -mx-2 px-2 text-h3 leading-[1.3]">
                        <span class="pointer-events-none absolute top-0 left-0 z-0 h-full w-full bg-gradient-metallic bg-clip-text text-transparent [-webkit-text-stroke:3px_transparent]">{{ t.philosophy.full_transparency }}</span>
                        <span class="relative z-10 bg-gradient-dark-green bg-clip-text text-transparent">{{ t.philosophy.full_transparency }}</span>
                    </h3>
                </header>
                <p class="text-body text-console-green">
                    {{ t.philosophy.open_source_text }}
                    <span class="ml-0.5 inline-block h-[18.583px] w-[8.745px] animate-[console-blink_1s_step-end_infinite] bg-console-green align-text-bottom"></span>
                </p>
            </div>
        </article>
    </div>
    <!-- Row 2 -->
    <div class="flex flex-col items-stretch gap-2.5 sm:gap-[20px] md:flex-row">
        <article class="relative h-71.25 w-full min-w-full overflow-hidden rounded-xl md:min-w-55 md:flex-1">
            <img alt="{{ t.philosophy.modular_text }}" loading="lazy" class="absolute inset-0 h-full w-full rounded-xl object-cover" src="{{ url_for('static', filename='images/modular-background.webp') }}" />
            <h3 class="text-shadow-xl absolute right-4 top-2 bg-gradient-metallic-light bg-clip-text text-right text-h3 text-transparent">{{ t.philosophy.modular_heading_html | safe }}</h3>
            <p class="absolute bottom-5 left-1/2 w-73.75 max-w-[85%] -translate-x-1/2 text-center text-body text-white">{{ t.philosophy.modular_text }}</p>
        </article>
        <article class="relative h-71.25 w-full min-w-full overflow-hidden rounded-xl md:min-w-55 md:flex-1">
            <video
                class="absolute inset-0 h-full w-full rounded-xl object-cover"
                src="{{ url_for('static', filename='videos/metal-background.mp4') }}"
                autoplay
                muted
                loop
                playsinline
                preload="metadata"
                aria-label="{{ t.philosophy.quality_bottom_right }}"
            ></video>
            <h3 class="text-shadow-xl absolute top-2 left-4 bg-gradient-metallic-light bg-clip-text text-left text-h3 whitespace-nowrap text-transparent">{{ t.philosophy.quality_top_left }}</h3>
            <h3 class="text-shadow-xl absolute right-4 bottom-2 bg-gradient-metallic-light bg-clip-text text-right text-h3 whitespace-nowrap text-transparent">{{ t.philosophy.quality_bottom_right }}</h3>
        </article>
        <article class="relative h-71.25 w-full min-w-full rounded-xl bg-[linear-gradient(180deg,rgb(255,255,255)_19.767%,rgb(245,245,245)_84.884%)] md:min-w-55 md:flex-1">
            <div class="flex h-full w-full flex-col items-start justify-between gap-5.75 overflow-clip rounded-[inherit] px-5.75 py-6.25">
                <header class="flex w-full flex-col gap-4">
                    <div class="flex items-center gap-2.5">
                        <span class="material-symbols-outlined icon-22 text-black">info</span>
                        <h3 class="text-h4 whitespace-nowrap text-black">{{ t.philosophy.need_help }}</h3>
                    </div>
                    <p class="text-left text-body text-grey">{{ t.philosophy.help_description }}</p>
                </header>
                <address class="flex w-full flex-col gap-2.5 not-italic">
                    <div class="flex items-center gap-1.25">
                        <span class="material-symbols-outlined icon-18 text-primary">mail</span>
                        <a href="mailto:info@tinkerforge.com" class="text-body text-black hover:underline">info@tinkerforge.com</a>
                    </div>
                    <div class="flex items-center gap-1.25">
                        <span class="material-symbols-outlined icon-18 text-primary">call</span>
                        <a href="tel:+4952078973000" class="text-body text-black hover:underline">+49 5207 897300-0</a>
                    </div>
                </address>
                <a href="#footer" type="button" class="btn-primary w-full">{{ t.philosophy.contact_cta }}</a>
            </div>
            <div aria-hidden="true" class="pointer-events-none absolute inset-0 rounded-xl border border-[rgba(255,255,255,0.8)]"></div>
        </article>
    </div>
{% endcall %}
