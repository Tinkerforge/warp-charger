title: "Bidirectional Charging"
description: "Bidirectional charging with the WARP4 Charger Pro: state of the technology and how we've prepared for ISO15118-20."

badge: "Bidirectional charging"
subtitle: "From the EV back into the home and the grid"

intro:
  badge: "What is bidirectional charging?"
  headline: "Power flows in both directions"
  diagram_aria: "Diagram: power flows from the EV through the charger back to the grid."
  diagram_labels:
    grid: "Grid"
    wallbox: "WARP Charger"
    ev: "EV"
  body_html: >
    With bidirectional charging, power flows in both directions between the EV and the
    home or grid. The vehicle does not only draw power, it can also feed it back. The
    EV thus becomes an energy storage for the house and the grid.
  variants_html: >
    A distinction is made between bidirectional <strong>direct current (DC)</strong> and
    <strong>alternating current (AC)</strong> charging. With bidirectional DC charging,
    the vehicle's battery is accessed directly. The inverter for charging and discharging
    sits inside the charger or charging station, which is why these solutions are
    expensive. With bidirectional AC charging, the charge and discharge electronics are
    built into the vehicle, and the charger only handles communication with the car.

status:
  badge: "Current state"
  headline: "ISO15118-20 as the foundation"
  body_html: >
    Technically, bidirectional charging requires the <strong>ISO15118-20</strong>
    charging standard. It is currently being implemented and rolled out both for
    chargers and for EVs. The standard's extended security architecture, in particular
    with public-key infrastructure (PKI), digital certificates and certificate pools /
    root CAs, requires significant development effort and an external certification
    process.
  open_questions_html: >
    On top of that, technical details such as grid-protection (NA-Schutz) for
    bidirectional AC charging are not yet fully defined. Beyond the technical roll-out
    of the charging infrastructure, additional factors such as the introduction of
    smart meters are required for a nationwide roll-out.

warp:
  badge: "Bidirectional charging with WARP"
  headline: "Prepared at the hardware level"
  body_html: >
    The legal and technical framework for bidirectional AC charging in Germany has not
    yet been fully settled. Once the groundwork is in place, we will deliver bidirectional
    charging via a software update, provided it is technically feasible.
  highlight_html: >
    We have, however, done everything we can to ensure that the
    <a href="/en/products/warp4-charger" class="prose-link"><strong>WARP4 Charger Pro</strong></a>
    is equipped with the hardware needed to support this functionality in the future.
