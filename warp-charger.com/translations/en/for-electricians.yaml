# WARP for Electricians (EN)
title: "WARP for Electricians."
description: "WARP Charger: the easy-to-install charger for electrical professionals."

hero:
  badge: "WARP for Electricians"
  headline: "Engineered down to the last terminal."

installation:
  badge: "Installation"
  headline: "Easy to install."
  text: "The WARP Charger is made for electricians. Generous connection space, clearly arranged terminals and logical cable routing ensure fast and error-free installation. No unnecessary effort, no hidden pitfalls."

compatibility:
  badge: "Compatibility"
  headline: "The charger for all systems."
  text: "The WARP Charger is compatible with energy managers, inverters and smart meters from other manufacturers. Open interfaces (Modbus/TCP, SunSpec, HTTP, MQTT) enable integration into any existing system, without vendor lock-in."
  cta_text: "Compatible Devices"
  cta_url: "/en/solutions/maximum-compatibility#devices"

customization:
  badge: "Configuration"
  headline: "Individually configurable."
  text: "Available with custom engraving, various cable lengths and optional Tesla opener on request. This way the charger can be adapted to every customer's requirements."

charging_station:
  badge: "Charging Stand"
  headline: "Well-designed charging stand."
  text: "The WARP4 Charging Stand is more than the fence posts often used for chargers."
  points:
    - title: "Easy to set up"
      text: "The included mounting aid simplifies foundation preparation."
    - title: "Plenty of space for your own equipment"
      text: "Generous interior for RCDs, fuses or additional hardware such as network switches or LTE modems."
    - title: "High quality, not just a fence post"
      text: "2 mm thick, powder-coated. Durable and weather-resistant."

modular:
  badge: "Design"
  headline: "Modular design."
  text: "All components are individually replaceable. Defective parts can be replaced without having to swap the entire charger. This saves time and money, for you and your customers."

support:
  badge: "Support"
  headline: "Direct contact & support."
  text: "Talk directly to our engineers and developers. No call center, no waiting queues. Fast, competent help with technical questions, by phone or email."
  text2: "As is customary in the industry, we offer installers a discount. Get in touch with us."
