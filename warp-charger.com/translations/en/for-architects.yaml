# WARP for Architects (EN)
title: "WARP for Architects"
description: "WARP Charger: the designer charger for demanding architectural projects."

hero:
  badge: "WARP for Architects"
  headline: "Charging infrastructure that matches the building."

design:
  badge: "Design"
  headline: "The designer charger."
  text: "The WARP Charger seamlessly integrates into any architecture with its minimalist design. Clean lines, premium materials and a compact form factor make it the first choice for design-conscious projects."

materials:
  badge: "Materials"
  headline: "High-Quality Surfaces."
  text: "Available powder-coated (DB703 iron mica) or in brushed stainless steel. Both variants are weather-resistant, durable and blend harmoniously into modern facades and outdoor areas."

custom:
  badge: "Customisation"
  headline: "Custom solutions."
  text: "The WARP Charger can be individually customised. Custom engravings, various coatings and special configurations are available on request, ideal for projects with particular design requirements."

quality:
  badge: "Quality"
  headline: "High quality and durable."
  text: "Development and manufacturing in Germany with a 3-year warranty. Modular design enables replacement of individual components. A product that lasts as long as the building."

compact:
  badge: "Form factor"
  headline: "Compact and discreet."
  text: "With its compact dimensions, the WARP Charger is one of the smallest chargers on the market. It can be discreetly mounted on walls, in garages or on charging stations without disturbing the overall architectural impression."
