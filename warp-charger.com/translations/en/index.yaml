      image: "img-placeholder-1.webp"
    - badge: ""
      headline: "WARP - Also for charging parks."
      body: "Every WARP Charger can be configured as a load manager for up to 63 additional WARP Chargers. Without any extra hardware."
      image: "img-placeholder-2.webp"
    - badge: ""
      headline: "Charging when it's cheapest."
      body: "In Eco mode, WARP decides for you whether charging can rely on PV excess alone, or whether to top up during hours with low electricity prices. In the end, the vehicle is charged cost-effectively by your departure time."
