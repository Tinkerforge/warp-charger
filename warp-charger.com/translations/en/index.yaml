  headline: "Next generation of charging."
  body: "WARP4 supports the ISO 15118 communication standard and is thus hardware-ready for bidirectional charging, allowing your vehicle to be used as an energy storage in the future. Additionally, the extended communication enables direct reading of the vehicle's state of charge (SoC), allowing charging processes and your own energy management to be controlled even more precisely."
