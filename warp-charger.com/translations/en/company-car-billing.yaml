title: "Company Car Billing"
description: "Create charge logs locally and free of charge. Completely without cloud!"

badge: "Company Car Billing"
subtitle: "Create charge logs locally and free of charge. Completely without cloud!"

chargelog:
  badge: "Charge Log"
  headline: "Charge Log with WARP4"
  intro: "With the WARP4 Charger Pro, charging sessions can be recorded locally on the charger without any cloud. A charging session can be started with one of the included NFC (RFID) cards and ends when the car is disconnected from the charger."
  recorded_heading: "The following information is stored for each charging session:"
  recorded_items:
    - "Start date and time of the charging session"
    - "User who started the charging session"
    - "Meter reading at the start and end of the session, used to calculate the charged energy in kWh"
    - "Duration of the charging session"
  cost_info: "From this information and the configured electricity price, the costs of the charging sessions are calculated."
  export_info: "The charge log can be filtered by all or specific users and downloaded as PDF or CSV for any time period."
  example_link_text: "Download example charge log"
  example_link_url: "https://www.warp-charger.com/documents/beispiel_ladelog.pdf"

billing:
  badge: "Billing"
  headline: "Billing towards your employer"
  intro: "When a company vehicle is charged at home on a charger, the charging session is tax-free according to § 3 Nr. 46 EStG (German Income Tax Act)! However, these charging sessions must be billed to the employer in a legally compliant manner."
  highlight: "This is possible with the WARP4 Charger Pro without cloud and without any additional costs!"
  features:
    - icon: "verified"
      title: "MID-compliant meter"
      text: "The WARP4 Charger Pro includes the MID-compliant meter DSZ15DZMOD-3x80A by Eltako, certified according to EU Measuring Instruments Directive 2014/32/EU."
    - icon: "edit_note"
      title: "Custom letterhead"
      text: "In the web app, a custom letterhead for the PDF charge log can be defined with your own address, company vehicle information and more."
    - icon: "group"
      title: "Multi-user operation"
      text: "Different NFC cards can be assigned to different users. When creating the charge log for employer billing, company charging sessions can be specifically filtered."
