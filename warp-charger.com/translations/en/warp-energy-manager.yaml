faq:
  eyebrow: "FAQs"
  heading: "More questions?"
  section_icon: "help"
  group_name: "wem-faq"
  items:
    - question: "Does the WARP Energy Manager also work without internet access/cloud?"
      answer_html: "All control and analysis runs locally on the Energy Manager. Functions such as the solar forecast, the use of dynamic electricity prices and the use of the apps require an internet connection."
    - question: "Do I have to use every function?"
      answer_html: "No. You can enable individual building blocks, for example dynamic tariff with a heat pump only, and extend later."
    - question: "Which heat pumps are supported?"
      answer_html: "All heat pumps with an SG-Ready interface. The Energy Manager can request extended operation, keep normal operation, or block the heat pump."
    - question: "How many WARP Chargers can I connect?"
      answer_html: "Up to 64 <a href=\"/en/products/warp4-charger\" class=\"prose-link\">WARP4 Chargers</a> in a group, with no additional charge management hardware. Static and dynamic modes are both supported."
    - question: "Which inverters and meters are supported?"
      answer_html: "Over 100 devices from common manufacturers. See the <a href=\"/en/solutions/maximum-compatibility\" class=\"prose-link\">full compatibility list</a> on our solutions page."
    - question: "Can the WARP Energy Manager also control my home battery?"
      answer_html: "Reading data from many battery systems works today. Active control (charge / discharge) is currently being built up, first devices are already supported. See the <a href=\"/en/solutions/maximum-compatibility\" class=\"prose-link\">full compatibility list</a> on our solutions page."
    - question: "Where do I install the Energy Manager?"
      answer_html: "In the distribution unit on a DIN rail (4 TE wide). Connectors for network, relays, inputs and Modbus RTU (RS485) sit directly on the module."
    - question: "How is my consumption data recorded?"
      answer_html: "The WARP Energy Manager records consumption data exclusively locally on the device. No data is transmitted to a cloud or similar service."
    - question: "Is the hardware open source?"
      answer_html: "Yes. Both the hardware design files and the firmware are fully open source. Custom extensions and integrations are explicitly encouraged."

