intro:
  badge: "What is the Energy Manager 2.0?"
  headline: "Local control for PV, heat pump, chargers and home battery."
  body_html: >
    The WARP Energy Manager 2.0 is the intelligent control centre for home energy
    management. Depending on the current <strong>dynamic electricity price</strong>,
    the <strong>PV excess</strong> or a power limit under <strong>§14a EnWG</strong>,
    it controls heat pumps (SG-Ready), up to 64
    <a href="/en/products/warp4-charger" class="prose-link"><strong>WARP4 Chargers</strong></a>,
    a home battery and other loads.
  body2_html: >
    All control and data logging runs <strong>locally</strong> on the Energy Manager, not in the cloud.
    Hardware and software are fully open source and developed and built in Germany.

