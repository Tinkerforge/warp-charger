      hp_normal: "Normal mode"
      hp_boost: "Boost mode"
    descriptions:
      step1: "Low sun: the PV array delivers only 1 kW, the heat pump waits for more excess."
      step2: "Enough sun: 3 kW solar yield, 1.5 kW excess flows into the heat pump."
      step3: "Full sun: 9 kW solar yield, the heat pump runs at 3 kW from the excess."
  em_dynamic_prices_diagram:
    diagram_aria: "Diagram: Dynamic tariff. The Energy Manager switches the heat pump based on price and PV yield."
    diagram_labels:
      solar: "Solar"
      meter: "Meter"
      grid: "Grid"
      em: "Energy Manager"
      heatpump: "Heat pump"
    descriptions:
      step1: "Full sun, expensive grid: PV powers the heat pump at 3 kW, no grid import needed."
      step2: "No sun, expensive grid: the heat pump is blocked, no consumption at peak prices."
      step3: "No sun, cheap grid: the heat pump runs at 3 kW from the grid and pre-heats the buffer tank."
  heat_curve_diagram:
    diagram_aria: "Diagram: Heat curve. Three daily timelines show the heat pump's runtime at +10 °C, 0 °C and −10 °C."
    heading: "Heat Curve"
    subhead: "Daily heat-pump runtime"
    hours_unit: "h"
    caption: "As outside temperature drops, the Energy Manager automatically extends runtime and heat output of the heat pump along the heating curve."
    row1:
      label: "Mild"
      temp: "+10 °C"
      runtime: "4 h/day"
      power: "2 kWh"
    row2:
      label: "Frosty"
      temp: "0 °C"
      runtime: "8 h/day"
      power: "5 kWh"
    row3:
      label: "Very cold"
      temp: "−10 °C"
      runtime: "18 h/day"
      power: "10 kWh"
  em_wallbox_diagram:
    diagram_aria: "Diagram: Charge management. As PV yield grows, the Energy Manager activates the heat pump, then the first charger, then the second charger, and finally the home battery."
    diagram_labels:
      solar: "Solar"
      meter: "Meter"
      em: "Energy Manager"
      battery: "Home battery"
      wallbox1: "Charger 1"
      wallbox2: "Charger 2"
      heatpump: "Heat pump"
    descriptions:
      step1: "Low sun, 1 kW PV: the Energy Manager supplies the heat pump first. Chargers and home battery wait."
      step2: "More sun, 12 kW PV: the heat pump keeps running and the first car charges at full power on charger 1."
      step3: "Bright sun, 13 kW PV: a second car joins, the Energy Manager splits the solar power so both chargers run at 6 kW each."
      step4: "PV excess, 17 kW PV: heat pump and both cars keep running, the remaining 4 kW go into the home battery."
  em_battery_control_diagram:
    diagram_labels:
      solar: "Solar"
      meter: "Meter"
      grid: "Grid"
      em: "Energy Manager"
      battery: "Home battery"
      heatpump: "Heat pump"
    priority:
      diagram_aria: "Diagram: Battery priority. With PV excess the home battery is charged first, then the Energy Manager powers the heat pump."
      descriptions:
        step1: "PV excess first flows into the home battery, the heat pump waits. Priority is freely configurable (heat pump first also possible)."
        step2: "Battery full: excess solar now powers the heat pump."
    block:
      diagram_aria: "Diagram: Block home battery. The full home battery stays untouched; energy for the heat pump is drawn directly from the grid."
      descriptions:
        step1: "Home battery blocked: instead of discharging the full battery, the heat pump runs straight from the grid. Later, when electricity prices are higher, the house can be powered from the battery."
