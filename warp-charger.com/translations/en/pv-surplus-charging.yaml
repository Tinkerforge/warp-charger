title: "PV Surplus Charging"
description: "PV surplus charging with WARP Charger: charge your own solar power into your EV without additional hardware."

badge: "PV Surplus Charging"
subtitle: "Charge your own solar power, no additional hardware required"

intro:
  badge: "Maximize self-consumption"
  headline: "Use your own electricity"
  text: "Anyone with their own photovoltaic system wants to use as much of the produced electricity as possible. The WARP Charger enables pure PV surplus charging, where only excess energy is charged into the vehicle, without additional hardware."
  text2: "PV surplus charging requires an energy meter at the grid connection to determine the surplus. Typically, the system regulates to 0 W grid consumption: all PV power is charged into the vehicle without drawing from the grid."
  highlight: "WARP Charger Smart and Pro can do PV surplus charging on their own, no WARP Energy Manager needed!"

compatibility:
  badge: "Open platform"
  headline: "Direct communication with the inverter"
  text: "Our goal is that the WARP Charger can easily be combined with an existing PV system. To avoid major modifications and the purchase of additional devices, the WARP Charger is compatible with a wide range of inverters and energy meters."
  text2: "If the inverter supports SunSpec, you only need to enter the hostname or IP, and the device is automatically detected. For devices without SunSpec support, we have implemented manufacturer-specific interfaces."
  text3: "Once an energy meter is configured, PV surplus charging can begin immediately. No additional external hardware is required."
  cta_text: "Compatible devices"
  cta_url: "/en/solutions/maximum-compatibility#devices"

modes:
  badge: "Charging modes"
  headline: "Surplus charging tailored to your needs"
  text: "On the webapp's home page, you can choose between different charging modes:"
  list:
    - title: "PV"
      icon: "solar_power"
      desc: "Only electricity generated by your own PV system is used for charging."
    - title: "Min+PV"
      icon: "add_circle"
      desc: "PV surplus is charged, but a defined minimum power is always drawn from the grid."
    - title: "Eco+PV"
      icon: "eco"
      desc: "The vehicle is charged by a configurable departure time. The charger autonomously combines PV charging and dynamic electricity prices."
    - title: "Fast"
      icon: "bolt"
      desc: "Charges at the maximum available power, regardless of current PV generation."

phase_switching:
  badge: "Phase switching"
  headline: "Charge from 1.4 kW with automatic phase switching"
  text: "The IEC 61851 standard mandates a minimum charging current of 6 A. With three phases, this already amounts to approx. 4.2 kW, often too much for pure surplus charging with small PV systems or cloudy weather."
  text2: "With automatic phase switching, the WARP Charger can independently switch between 3-phase and 1-phase charging. This enables charging from as little as 1.4 kW, a major advantage for PV surplus charging!"

settings:
  badge: "Configuration"
  headline: "Fine-grained settings"
  list:
    - title: "Control behavior"
      desc: "Defines the target grid consumption, allowing you to prioritize a battery storage higher or lower than vehicle charging."
    - title: "Cloud filter"
      desc: "Adjusts the control inertia. During partly cloudy weather, short PV power fluctuations are smoothed out."
    - title: "Battery storage"
      desc: "If a battery storage can be read out, it is directly included in the control loop. The priority between charger and storage is configurable."
