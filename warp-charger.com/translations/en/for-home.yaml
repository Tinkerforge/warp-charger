title: "WARP for home"
description: "Fully equipped, open, modular and compact: the WARP4 charger for your home."

badge: "WARP for home"
subtitle: "The charger for your home."

fullsuite:
  badge: "Fully equipped charger"
  headline: "Everything included, out of the box."
  body_html: >
    WARP4 is the fully equipped charger. It is compatible with a wide range of other
    devices, ships with built-in
    <a href="/en/solutions/pv-excess-charging" class="prose-link">PV excess charging</a>,
    combines this with
    <a href="/en/solutions/dynamic-tariff" class="prose-link">dynamic tariff</a>
    in Eco mode and can even control your home battery storage.
  updates_html: >
    Regular, free software updates keep extending the feature set long after
    purchase.

open:
  badge: "Open system"
  headline: "Independent from any vendor ecosystem."
  body_html: >
    Many other chargers are tied to their manufacturer's ecosystem. WARP goes the
    other way around and is designed to be compatible with other systems. You stay
    independent and are not forced to keep using a specific manufacturer's components
    in the future.
  hems_html: >
    On top of that, WARP exposes a broad range of open interfaces so it can be
    integrated into your own HEMS.
  link_url: "/en/solutions/maximum-compatibility#devices"
  link_label: "Compatible devices"

compact:
  badge: "Compact and stylish"
  headline: "Blends in instead of standing out."
  body_html: >
    At only <strong>280 × 215 × 95&nbsp;mm</strong>, WARP4 is very compact and, thanks
    to its selectable front panel, blends effortlessly into the look of any building.
  durability_html: >
    The high-quality components are UV-stable and still look good after long-term
    outdoor use.

modular:
  badge: "Modular"
  headline: "Upgrade instead of replace."
  body_html: >
    WARP is built modularly. Chargers can be upgraded and reconfigured later on.
    Should anything break, it can be repaired easily and affordably.

apps:
  badge: "Apps for Android and iOS"
  headline: "Remote Access without cloud lock-in."
  body_html: >
    We avoid the cloud wherever possible. WARP operates as self-contained as it can.
    Of course, you should still be able to control the WARP Charger from on the go.
  remote_html: >
    Our Android and iOS apps use our remote access feature. Communication does not
    travel through a cloud but happens directly between the app and the WARP Charger.
  link_url: "/en/software/apps"
  link_label: "More about the apps"
