# Unternehmen / Company page translations (EN)
title: "Company"
description: "Tinkerforge GmbH: The team behind WARP. Open source charging solutions, Made in Germany."

badge: "Company"
badge_icon: "apartment"
headline: "The Team Behind WARP"
intro: >
  WARP is the e-mobility division of Tinkerforge. Tinkerforge GmbH was founded in 2011 and
  is based in Schloß Holte-Stukenbrock, Germany. We develop and manufacture open source
  charging solutions, truly Made in Germany.

# About section
about:
  badge: "About Us"
  badge_icon: "info"
  headline: "Who We Are"
  text: >
    At Tinkerforge, we believe that products must be open. Only then do they truly belong to
    their users. That's why we follow the open source philosophy by publishing the source code
    and schematics of all our software and hardware, enabling everyone to modify and extend
    our products to suit their needs.
  text2: >
    Through close collaboration with our active community, we rapidly develop customer-oriented
    solutions. From hardware design to software development, sales and shipping. Everything
    comes from a single source.

# Values / pillars
pillars:
  - icon: "code"
    title: "Open Source"
    text: "Both the hardware and software of our products are open source. WARP4 Charger OSHWA UID DE000125."
  - icon: "flag"
    title: "Made in Germany"
    text: "Development and manufacturing in Schloß Holte-Stukenbrock, Germany. Real local value creation."
  - icon: "cloud_off"
    title: "No Cloud"
    text: "Our products work without any cloud. Fully independently usable: WARP belongs to the customer."
  - icon: "build"
    title: "Modular & Sustainable"
    text: "Modular design with replaceable components. Defective parts can be replaced individually."
  - icon: "verified"
    title: "3 Year Warranty"
    text: "We provide a three-year warranty on all WARP components."
  - icon: "handshake"
    title: "Direct Contact"
    text: "Talk directly to our engineers and developers. No call centers."

