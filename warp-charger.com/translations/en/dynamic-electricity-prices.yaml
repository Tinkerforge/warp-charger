title: "Dynamic Electricity Prices"
description: "Use dynamic electricity prices with WARP: automatically charge EVs and run heat pumps when prices are low."

badge: "Dynamic Electricity Prices"
subtitle: "Use cheap electricity for your consumers"

intro:
  badge: "Save costs"
  headline: "Use cheap electricity"
  text: "With a dynamic electricity tariff, costs can be saved by shifting consumption to the cheapest hours."
  text2: "WARP Chargers can automatically shift vehicle charging to cheap hours in Eco mode. The WARP Energy Manager can use dynamic electricity prices to put a heat pump into extended operation via the SG-Ready interface when prices are low."
  highlight: "Dynamic generation prices are automatically sourced from the ENTSO-E electricity exchange. All additional price components are manually configurable, so all electricity providers are supported!"

eco:
  badge: "Eco mode"
  headline: "Optimized charging"
  text: "WARP Charger Smart and Pro offer various selectable charging modes. In Eco charging mode, the user defines the desired departure time and charging duration."
  text2: "The charger then calculates a charging plan considering the forecasted PV generation and dynamic electricity prices. In Eco mode, the vehicle is preferably charged with PV power. If forecasted PV yields are too low, the hours with the lowest electricity costs are used."

sgready:
  badge: "SG-Ready"
  headline: "Heat pump control"
  text: "Especially in new buildings, the time at which a heat pump runs can be shifted to cheap hours."
  text2: "The WARP Energy Manager can control heat pumps via the SG-Ready interface. During hours with cheap electricity prices, the heat pump is put into extended operation: hot water and heating circuits are raised to higher temperatures to bridge longer periods afterwards."
  text3: "Additionally, the heat pump can be blocked during expensive hours, so no electricity is consumed by the heat pump during those times."

battery:
  badge: "Battery storage"
  headline: "Grid-serving battery control"
  text: "The WARP Energy Manager can operate battery storage in a grid-serving manner: during times of cheap electricity prices, the storage is charged. When the price is high, the storage is used and thus discharged."

pricing:
  badge: "Pricing"
  headline: "Flexible price configuration"
  text: "Instead of implementing a different interface for each electricity provider, the system obtains Day-Ahead prices from the European Network of Transmission System Operators (ENTSO-E)."
  text2: "The dynamic electricity price consists of exchange prices plus provider-specific additional costs (grid fees, taxes, surcharges, VAT). These can be configured according to the respective provider."
  features:
    - icon: "public"
      title: "ENTSO-E integration"
      desc: "Day-Ahead prices are automatically sourced from the European electricity exchange."
    - icon: "calculate"
      title: "Configurable surcharges"
      desc: "Grid fees, taxes and VAT individually configurable, matching any provider."
    - icon: "calendar_month"
      title: "Price calendar"
      desc: "Define fixed prices or surcharges per weekday and quarter hour, ideal for time-variable grid fees."
