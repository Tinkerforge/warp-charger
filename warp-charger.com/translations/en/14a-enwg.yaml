title: "§14a EnWG"
description: "Comply with §14a EnWG easily using WARP Charger: controllable consumption device configured in minutes."

badge: "§14a EnWG"
subtitle: "Regulatory compliance made easy"

intro:
  badge: "Legal requirement"
  headline: "What is §14a EnWG?"
  text: "§14a of the German Energy Industry Act (EnWG) applies to all consumption devices with a power rating above 4.2 kW, especially chargers. By law, a WARP Charger must be throttleable to 4.2 kW by the grid operator at any time."
  text2: "The devices are never fully shut off. A minimum power of 4,200 W always remains available."
  text3: "In return, users with controllable consumption devices benefit from reduced grid fees."

modules:
  badge: "Modules"
  headline: "Three modules to choose from"
  text: "Depending on electricity consumption and situation, a suitable module can be chosen:"
  list:
    - title: "Module 1: Flat-rate reduction"
      icon: "payments"
      desc: "Grid fees are reduced by a flat rate based on assumed fixed consumption. A fixed euro amount is credited annually, regardless of actual consumption. No additional hardware needed."
    - title: "Module 2: 60% reduction"
      icon: "percent"
      desc: "Grid fees are reduced to 40%. A separate consumption meter is technically required. Mainly interesting for high-consumption users."
    - title: "Module 3: Time-variable grid fees"
      icon: "schedule"
      desc: "In addition to the flat rate, grid fees vary by time of day in three tiers (standard, peak, off-peak). Worth it when consumption can be shifted to off-peak hours. WARP's Eco mode does this automatically."

signals:
  badge: "Signal sources"
  headline: "Control by the grid operator"
  text: "WARP Charger and Energy Manager support various signal sources for grid operator control:"
  list:
    - title: "Ripple control receiver"
      icon: "radio"
      desc: "Potential-free contact at the charger shutdown input or at an input of the WARP Energy Manager."
    - title: "FNN control box (switching output)"
      icon: "toggle_on"
      desc: "Like ripple control receiver, connection via potential-free contact at WARP Charger or Energy Manager."
    - title: "FNN control box (EEBUS)"
      icon: "lan"
      desc: "Digital control over the network via EEBUS protocol. WARP Charger and Energy Manager support EEBUS."
    - title: "API (HTTP/MQTT/Modbus/OCPP)"
      icon: "api"
      desc: "Control by the grid operator is also possible via other common interfaces such as HTTP, MQTT, Modbus TCP and OCPP."

preparation:
  badge: "Preparation"
  headline: "Prepare the connection"
  text: "Most grid operators currently offer neither ripple control receivers nor control boxes. In this case, it is sufficient to connect the WARP Charger to the network via Ethernet or WiFi."
  text2: "When the rollout happens at your grid operator, the control box can be configured directly to control the WARP Charger over the network. 50% coverage is planned by 2029."
  highlight: "Recommendation: Ethernet connection for reliable reachability. Alternatively WiFi with good signal quality."

doc_link:
  text: "Detailed documentation"
  url: "https://docs.warp-charger.com/en/docs/tutorials/verbrauchseinrichtung"
