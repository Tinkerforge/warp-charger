title: "Multi-Dwelling Subsidy."
description: "German federal subsidy \"Laden im Mehrparteienhaus\": up to €2,000 per charge point. All WARP4 Chargers are eligible."

badge: "Subsidy"
subtitle: "Charging in multi-dwelling buildings."

subsidy:
  badge: "The subsidy"
  headline: "Federal subsidy \"Laden im Mehrparteienhaus\"."
  body_html: >
    The German federal subsidy programme
    <a href="https://www.laden-im-mehrparteienhaus.de/" target="_blank" rel="noopener" class="prose-link">Laden im Mehrparteienhaus</a>
    funds charge points for homeowners' associations (WEG), private owners of multi-dwelling
    buildings and owners of parking spaces. Up to <strong>€2,000 per charge point</strong>
    are funded for installation, cabling and grid connection.
  conditions_html: >
    Per building, at least six parking spaces and at least 20&nbsp;% of all parking
    spaces belonging to the property must be electrified. Further conditions can be
    found in the
    <a href="https://www.laden-im-mehrparteienhaus.de/faq-und-download/" target="_blank" rel="noopener" class="prose-link">subsidy FAQ</a>.

warp4:
  badge: "WARP4 Charger"
  headline: "Eligible out of the box."
  body_html: >
    All <a href="/en/products/warp4-charger" class="prose-link">WARP4 Chargers</a>
    are eligible for the subsidy and can be found under
    <strong>Tinkerforge GmbH</strong> in the official list of manufacturers.
  ladesaeule_html: >
    Our charging stands are not on the list because they can only be deployed
    together with one or two WARP4 Chargers.
