# Android/iOS Apps (EN)
title: "Android/iOS Apps"
description: "Control your WARP Charger and WARP Energy Manager via app, locally and on the go."

hero:
  badge: "Apps"
  headline: "WARP on the go"
  text: "With the WARP apps for iOS and Android, you always have your WARP Charger and WARP Energy Manager at your fingertips. Check charging status, change settings and monitor energy flows, right from your smartphone."
  appstore_url: "https://apps.apple.com/us/app/warp-by-tinkerforge/id6736695801"
  appstore_label: "App Store"
  playstore_url: "https://play.google.com/store/apps/details?id=com.tinkerforge.warp"
  playstore_label: "Google Play"

remote:
  badge: "Remote Access"
  headline: "Access from anywhere"
  text: "Using the built-in remote access, you can reach your devices anytime and from anywhere. The apps use an encrypted WireGuard VPN connection via my.warp-charger.com."
  text2: 'Register for free at my.warp-charger.com, add your device in the <a href="/en/software/web-interface" class="prose-link">web interface</a> under System → Remote Access, and you''re done. Once set up, a single tap is all it takes.'
  link_url: "https://my.warp-charger.com"
  link_label: "Register now"

privacy:
  badge: "Privacy"
  headline: "Your data belongs to you"
  text: "Every remote access connection establishes its own encrypted VPN, with only two participants: your device and your charger. Nobody else can see your data, not even us."
  text2: "All data, except for your email address and username, is stored encrypted on our server in such a way that even we cannot decrypt it."

local:
  badge: "Local"
  headline: "Works locally too"
  text: "The apps also work on your local network, without remote access or an internet connection. When your smartphone is on the same Wi-Fi as the charger, the apps connect directly to the device."
  hint: "Available with the next app release."
