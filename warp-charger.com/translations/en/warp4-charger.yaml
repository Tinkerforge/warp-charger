intro:
  badge_icon: "help"
  badge_text: "What is the WARP4 Charger?"
  headline: "The fully-equipped charger."
  body1: "The WARP4 Charger is the high-quality open-source charger with up to 22 kW charging power, made in Germany. It is built for longevity, has a modular design and is already prepared for bidirectional charging."
  body2: "Thanks to its compatibility with over 100 devices from other manufacturers (including electricity meters, PV inverters and battery storage), it integrates easily into existing systems."
  body3: "As a fully-equipped charger, the WARP4 Charger offers integrated PV excess charging, eco mode for intelligently combining solar forecast data, dynamic electricity prices and PV excess, static or dynamic load management over the network, and numerous open interfaces."

