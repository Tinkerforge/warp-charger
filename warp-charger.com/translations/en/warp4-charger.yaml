  section_icon: "auto_awesome"
  aria_label: "Charging scenarios"
  info_aria: "Explain diagram"
  info_label: "Info"
  info_close_aria: "Close"
  info_step_eyebrow: "Step {n}"
  info_step_aria: "Show step {n}"
  info_legend_green: "Solar / home battery"
  info_legend_blue: "Grid import"
  pv_surplus_diagram:
    diagram_aria: "Diagram: PV excess charging. The heat pump receives a constant 2 kW; excess solar power (0 / 1.4 / 11 kW) is routed through the WARP Charger into the vehicle."
    diagram_labels:
      solar: "Solar"
      meter: "Meter"
      heatpump: "Heat pump"
      wallbox: "WARP Charger"
      ev: "Vehicle"
    descriptions:
      step1: "Low sun: The 2 kW barely cover other consumers, so the EV has to wait."
      step2: "Midday sun: Other consumers run and 1.4 kW of excess charge the EV on a single phase."
      step3: "Full sun: Switched to three-phase, 11 kW flow into the EV and 2 kW into other consumers."
  eco_mode_diagram:
    diagram_aria: "Diagram: Eco mode. The charger charges either from PV excess or from the grid when electricity prices are low."
    diagram_labels:
      solar: "Solar"
      meter: "Meter"
      heatpump: "Heat pump"
      grid: "Grid"
      wallbox: "WARP Charger"
      ev: "Vehicle"
    descriptions:
      step1: "Full sun, expensive grid: PV powers other consumers and the EV, with no grid draw."
      step2: "No sun, expensive grid: Only other consumers run on 2 kW from the grid, the EV waits."
      step3: "No sun, cheap grid, poor solar forecast: The EV now charges at full power from the grid."
  battery_control_diagram:
    diagram_labels:
      solar: "Solar"
      meter: "Meter"
      heatpump: "Heat pump"
      grid: "Grid"
      wallbox: "WARP Charger"
      battery: "Home battery"
      ev: "Vehicle"
    priority:
      diagram_aria: "Diagram: Battery priority. PV excess is used to charge the home battery first, then the vehicle."
      descriptions:
        step1: "PV excess charges the home battery first, so the EV waits. The priority is freely configurable (EV first also possible)."
        step2: "Battery full: excess solar now flows into the EV."
    block:
      diagram_aria: "Diagram: Block home battery. The full home battery stays untouched; energy to charge the EV is drawn directly from the grid."
      descriptions:
        step1: "Home battery blocked: instead of discharging the full battery, the EV charges straight from the grid. Later, when electricity prices are high, the house can be powered from the battery."
  bidirectional_diagram:
    diagram_aria: "Diagram: Bidirectional charging. Energy flows from the EV through the WARP Charger back into the grid."
    coming_soon_label: "Coming soon"
    diagram_labels:
      grid: "Grid"
      wallbox: "WARP Charger"
      ev: "Vehicle"
  items:
    - { id: "pv-surplus",      icon: "wb_sunny",              label: "PV Excess",        desc: "Charge excess solar power into the EV", panel: "pv_surplus" }
    - { id: "eco-mode",        icon: "eco",                   label: "Eco Mode",         desc: "Decides whether to use cheap grid prices or PV excess", panel: "eco_mode" }
    - { id: "battery-control", icon: "battery_charging_full", label: "Battery Control",  desc: "Use or block the home battery on demand", panel: "battery_control", panel_tabs: { priority: "Priority", block: "Block" } }
    - { id: "load-management", icon: "balance",               label: "Charge Management",  desc: "Distributes the available power dynamically", panel: "load_management", panel_tabs: { static: "Static", dynamic: "Dynamic" } }
    - { id: "bidirectional",   icon: "swap_vert",             label: "Bidirectional charging", desc: "WARP4 Pro is ready for V2G/V2X", panel: "bidirectional" }

