  heading: "The right behavior for every situation."
  tagline: "Intelligent energy management"
  description_html: "All features run directly on the WARP4, with no additional hardware or external energy-management system. Over <a class=\"text-primary underline hover:opacity-80\" href=\"/en/solutions/maximum-compatibility#devices\">100 compatible devices</a> are directly supported."
