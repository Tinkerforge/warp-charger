faq:
  eyebrow: "FAQs"
  heading: "Any more questions?"
  section_icon: "help"
  group_name: "warp4-faq"
  items:
    - question: "Who is allowed to install the WARP4 Charger?"
      answer_html: "Installation must be carried out by a qualified electrician. They also handle the required registration with the grid operator."
    - question: "Do I need a Type B RCD?"
      answer_html: "No. The WARP4 has an integrated DC residual current detection (RDC-DD). A Type A RCD in the building's installation is sufficient."
    - question: "Does WARP4 also work without internet access/cloud?"
      answer_html: "All WARP4 features run locally on the charger. Operation and configuration happen via the built-in web interface on your home network, entirely without any cloud requirement. Only functions such as the solar forecast, the use of dynamic electricity prices and the use of the apps require an internet connection."
    - question: "How do I integrate the charger into my smart home?"
      answer_html: "The WARP4 supports open standards such as MQTT, Modbus TCP and an HTTP API. This allows seamless integration with Home Assistant, ioBroker, openHAB and other smart-home systems."
    - question: "How do I connect the charger to my existing PV system?"
      answer_html: "We support over 100 devices from other manufacturers and can access data from electricity meters, PV inverters and battery storage systems directly. Installing additional hardware, such as a dedicated meter for the charger, is therefore usually not needed since existing hardware can be used by the charger. See the <a href=\"/en/solutions/maximum-compatibility\" class=\"prose-link\">full compatibility list</a> on our solutions page."
    - question: "Which devices are supported?"
      answer_html: "The WARP4 communicates with numerous smart meters, PV inverters, electricity storage systems and heat pumps from various manufacturers. A complete compatibility list is available in the documentation."
    - question: "Why is only the Pro version prepared for bidirectional charging and able to read out the SoC"
      answer_html: "Only the Pro version has a built-in energy meter. We assume this is required for bidirectional charging in order to react to grid issues (anti-island protection / NA protection). A vehicle's SoC can be read out via ISO15118-2, but unfortunately not during an ongoing charging session. The Pro is able to keep track of the state of charge during the charging process with its energy meter."
    - question: "Which variant is suitable for billing?"
      answer_html: "For billing scenarios such as company EVs or in the workplace, we recommend the WARP4 Pro with MID-certified meter and charging log with energy capture. WARP4 is currently not suitable for applications that require a calibration-law-compliant (eichrechtskonform) solution."
    - question: "Is the charger eligible under the 'Charging in Multi-Dwelling Buildings' subsidy?"
      answer_html: "Yes, WARP4 is listed among the eligible chargers under our company name 'Tinkerforge GmbH'."
    - question: "Does WARP4 comply with §14a EnWG?"
      answer_html: "Yes. The WARP4 supports grid-compliant control as per §14a EnWG including an EEBUS interface for communication with the grid operator's control box standard."

