        - { label: "Central management", value: "Load manager can optionally handle user management and the charge log centrally."}
        - { label: "Dynamic electricity prices",    value: "Support for all tariffs. Electricity prices from ENTSO-E power exchange. Surcharges definable. Price calendar configurable with surcharges per weekday and time." }
