faq:
  eyebrow: "FAQs"
  heading: "More questions?"
  section_icon: "help"
  group_name: "charging-stand-faq"
  items:
    - question: "Which chargers fit on the WARP4 Charging Stand?"
      answer_html: "The pedestal is built for the <a href=\"/en/products/warp4-charger\" class=\"prose-link\">WARP4 Charger</a> in both Smart and Pro variants. Front and rear can be populated independently, and different variants can be combined freely."
    - question: "Which finish and colour are available?"
      answer_html: "The new WARP4 Charging Stand is produced exclusively in DB703 powder-coated, a dark anthracite-grey with high UV and weather resistance. Other colours are available on request."
    - question: "How is the pedestal anchored?"
      answer_html: "The pedestal is bolted onto a prepared foundation from the inside. The supplied steel template (mounting jig) precisely positions the mounting bolts before the foundation cures."
    - question: "Are the WARP4 Chargers included?"
      answer_html: "No. The WARP4 Charging Stand ships with integrated terminal enclosures where power and network connect at a central point. The WARP4 Chargers are ordered separately and then simply mounted into the stand and wired to the terminal enclosure."
    - question: "What is the difference between the stand for one charger and the stand for two chargers?"
      answer_html: "The upper part of the rear panel is closed (no openings) on the single-charger variant. On the two-charger variant, this part has openings for the second charger."
    - question: "Can the stand be retrofitted from one charger to two chargers?"
      answer_html: "Yes. The upper part of the rear panel is closed (no openings) on the single-charger variant. This part can simply be swapped for an element with openings for a second charger."
    - question: "Is the pedestal suitable for outdoor use?"
      answer_html: "Yes. The housing is IP54 rated and folded throughout (no weld seams). Together with the DB703 powder coating, the pedestal is approved for year-round outdoor installation."
    - question: "What about lead time and warranty?"
      answer_html: "The WARP4 Charging Stand is built to order in Schloß Holte-Stukenbrock, Germany. We offer a 3-year warranty on the product."
    - question: "Who is allowed to install the pedestal?"
      answer_html: "The electrical installation and registration with the grid operator must be carried out by a qualified electrician. The mechanical installation itself can be done with standard hand tools."

