title: "WARP for businesses"
description: "Charge management, centralised user administration and durable hardware: WARP Chargers for business use."

badge: "WARP for businesses"
subtitle: "WARP Chargers for the workplace."

load_management:
  badge: "Charge Management"
  headline: "More chargers on the existing grid connection."
  body_html: >
    Companies often want to install multiple charge points. With the integrated
    charge management, chargers can be installed even when the grid connection is
    not sized for the full number of chargers.
  link_url: "/en/solutions/charge-management"
  link_label: "More about Charge Management"

users:
  badge: "Centralised user management"
  headline: "Manage access locally, without the cloud."
  body_html: >
    The load manager can centrally administer all users of the charging park.
    Authorisation happens locally, without a cloud and without recurring costs.
  log_html: >
    Locally recorded charging sessions can also be assigned to individual users.

quality:
  badge: "Durable and high quality"
  headline: "Investment security through modular hardware."
  body_html: >
    Anyone investing in infrastructure wants it to last. WARP Chargers are built
    from high-quality components and have a modular design.
  repair_html: >
    Should anything ever break, it can be replaced easily and affordably.

made_in_germany:
  badge: "Made in Germany"
  headline: "A direct line to the manufacturer."
  body_html: >
    WARP Chargers are developed and manufactured in Germany. As the manufacturer,
    we are directly reachable for any questions or issues.
  link_url: "/en/about/company#made-in-germany"
  link_label: "More about Made in Germany"
