title: "Maximum Compatibility"
description: "Over 100 compatible devices: inverters, battery storage, energy meters and more. Open interfaces for maximum flexibility."

badge: "Compatibility"
subtitle: "Over 100 compatible devices, open interfaces for maximum flexibility."

intro:
  badge: "Open Platform"
  headline: "No Vendor Lock-In."
  text: "WARP Chargers and the WARP Energy Manager rely on open interfaces and standardized protocols. This makes them compatible with a wide range of inverters, battery storage systems and energy meters, regardless of manufacturer."
  text2: "The compatibility list is constantly growing. With user-definable Modbus/TCP register tables, even devices we do not yet support can be integrated."
  cta_text: "Introduction"
  cta_url: "https://docs.warp-charger.com/en/docs/compatible_devices/introduction"

interfaces:
  badge: "Interfaces"
  headline: "A lot of Options."
  text: "A wide range of interfaces enables integration of diverse devices:"
  list:
    - icon: "lan"
      title: "SunSpec"
      desc: "Automatic detection of inverters and energy meters via the SunSpec profile over Modbus/TCP."
    - icon: "settings_ethernet"
      title: "Modbus/TCP"
      desc: "Predefined register tables for over 60 devices, plus custom tables for any Modbus device."
    - icon: "cable"
      title: "Modbus/RTU"
      desc: "Integration of RS485 devices via USB converters or the WARP Energy Manager's built-in RS485 port."
    - icon: "wifi"
      title: "SMA Speedwire"
      desc: "Native support for SMA Sunny Boy, Sunny Tripower and SMA Energy Meter / Home Manager."
    - icon: "api"
      title: "HTTP/MQTT API"
      desc: "Push and pull interface for integration into custom systems and smart home platforms."
    - icon: "battery_charging_full"
      title: "RCT Power Serial"
      desc: "Direct integration of RCT Power battery storage via proprietary protocol."

devices:
  badge: "Devices"
  headline: "Over 100 Supported Devices."
  text: "Inverters, battery storage systems and energy meters from numerous manufacturers are supported as measurement sources for PV excess charging, dynamic load management and battery control."
  label_interfaces: "Interfaces"
  label_measurement: "Measurement Points"
  label_models: "Models (Selection)"
  label_docs: "Documentation"
  categories:
    - title: "Inverters / Hybrid"
      entries: "Fronius, SMA, Huawei, SolarEdge, Kostal, Deye, Goodwe, Growatt, Solax, Solis, Sungrow, Victron, Fox ESS, Alpha ESS, E3DC, Hoymiles, APsystems"
    - title: "Battery Storage"
      entries: "BYD, Fronius, SMA, Huawei, Kostal, Deye, Goodwe, Growatt, Solax, Solis, Sungrow, Victron, Fox ESS, Alpha ESS, E3DC, RCT Power"
    - title: "Energy Meters"
      entries: "Shelly Pro 3EM, Eastron SDM, YTL, Eltako, Carlo Gavazzi, Siemens PAC, SMA Energy Meter / Home Manager"

measurement:
  badge: "Measurement Points"
  headline: "Flexible Deployment."
  text: "Compatible devices deliver data from various positions in the home electrical system:"
  locations:
    - icon: "home"
      title: "Grid Connection"
      desc: 'For controlling <a href="/en/solutions/charge-management" class="prose-link">dynamic load management</a> and <a href="/en/solutions/pv-excess-charging" class="prose-link">PV excess charging</a>.'
    - icon: "solar_power"
      title: "PV Generation"
      desc: "For PV excess charging. Measures the current generation output of the inverter."
    - icon: "battery_horiz_075"
      title: "Battery Storage"
      desc: "For coordinated charging. Takes battery charge and discharge currents into account."
    - icon: "bolt"
      title: "Consumers"
      desc: "For detailed monitoring. Measures consumption of individual devices or groups."

battery_control:
  badge: "Battery Control"
  headline: "Intelligent Storage Management."
  text: "The WARP Charger and WARP Energy Manager can actively control compatible battery storage systems via Modbus/TCP with six different modes:"
  modes:
    - title: "Default Behavior"
      desc: "The storage operates according to its own logic without external control."
    - title: "Block Charging"
      desc: "Prevents storage charging, e.g. to prioritize PV power for EV charging."
    - title: "Block Discharging"
      desc: "Prevents discharging to save stored energy for later use."
    - title: "Force Charging"
      desc: "Forces storage charging, e.g. during low electricity prices."
    - title: "Force Discharging"
      desc: "Forces discharging, e.g. before periods of high electricity prices."
    - title: "Externally Controlled"
      desc: "Full control of charge/discharge power via external setpoint."
