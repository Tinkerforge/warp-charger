title: "Load Management"
description: "Load management with up to 64 WARP Chargers, static and dynamic, without additional hardware."

badge: "Load Management"
subtitle: "Intelligently manage up to 64 WARP Chargers, no additional hardware"

static:
  badge: "Static"
  headline: "Static load management"
  text: "When multiple chargers share a common supply line, the maximum current is often limited. Static load management distributes a fixed total current across up to 64 WARP Chargers."
  text2: "One charger is configured as the load manager and controls the other chargers. The available current is evenly distributed among all charging chargers. When another vehicle is connected, the system automatically redistributes."
  highlight: "No additional hardware required. The WARP Chargers handle load management on their own!"

dynamic:
  badge: "Dynamic"
  headline: "Dynamic load management"
  text: "In many cases, chargers share the grid connection with other consumers. When these are switched on and off, the available current changes constantly."
  text2: "Dynamic load management monitors the phase current at the grid connection via an energy meter and adjusts charger power accordingly. This ensures the maximum phase current is never exceeded and no fuse trips."
  text3: "As an open platform, a wide range of manufacturers and energy meters are supported."
  cta_text: "Compatible devices"
  cta_url: "/en/solutions/maximum-compatibility#devices"

smart:
  badge: "Intelligent"
  headline: "More than just limiting currents"
  text: "Electric vehicles cannot be controlled arbitrarily: minimum charging currents, minimum charging times and pauses must be respected. WARP Charger load management accounts for these characteristics and prevents vehicle error states."
  features:
    - icon: "balance"
      title: "Fair distribution"
      desc: "If there's not enough current for all vehicles, charging is rotated: maximum simultaneous sessions with fair switching."
    - icon: "swap_horiz"
      title: "Phase rotation"
      desc: "Phase allocation and rotation of chargers are considered to charge more vehicles in parallel and better utilize limits."
    - icon: "speed"
      title: "Real current draw"
      desc: "WARP Charger Pro measures actual phase current. Unused current is automatically assigned to other chargers."
    - icon: "trending_down"
      title: "Minimal switching"
      desc: "The load manager minimizes switching operations and ensures stable charging operation."

config:
  badge: "Configuration"
  headline: "Easy setup"
  text: "Load management is configured directly in the WARP Charger web interface:"
  steps:
    - title: "Enable external control"
      desc: "Activate external control mode on all managed chargers."
    - title: "Configure load manager"
      desc: "Designate one charger or the WARP Energy Manager as load manager and add chargers."
    - title: "Set total current"
      desc: "Configure the maximum total current of the shared supply line."
    - title: "Optional: Enable dynamic"
      desc: "Configure an energy meter at the grid connection and activate dynamic load management."
