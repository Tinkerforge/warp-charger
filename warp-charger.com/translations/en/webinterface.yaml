# Local Web Interface (EN)
title: "Local Web Interface"
description: "WARP Charger and WARP Energy Manager with local web interface, no internet or cloud required."

hero:
  badge: "Local Web Interface"
  headline: "Direct local access"
  text: "WARP Charger and WARP Energy Manager feature a local web interface. This web page can be accessed directly on the device and is available without internet or cloud. The web interface allows you to control the devices and configure all settings."

access:
  badge: "Accessibility"
  headline: "Access via LAN or access point"
  text: "The web interface can be reached via the device's LAN port. If LAN is not available, each device opens its own Wi-Fi network in factory state, which you can connect to. The credentials are unique to each device. Via this access point, the device can then also be added to your own Wi-Fi network."

offline:
  badge: "Self-sufficient"
  headline: "Works without internet"
  text: "We make sure that our devices work without an internet connection. Purely local operation is possible. Features like PV surplus charging, battery and heating control work without internet as well."
  text2: "Naturally, an internet connection is required when features like PV forecasting, dynamic electricity prices or remote access are enabled."
