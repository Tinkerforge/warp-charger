# Local Web Interface (EN)
title: "Local Web Interface"
description: "WARP Charger and WARP Energy Manager with local web interface, no internet or cloud required."

hero:
  badge: "Local Web Interface"
  headline: "Direct local access."
  text: "WARP Charger and WARP Energy Manager feature a local web interface, accessed directly on the device and with no internet or cloud required."
  hint_pre: "Note: For use on the go,"
  hint_link: "remote access and Android / iOS apps"
  hint_link_url: "/en/software/apps"
  hint_post: "are also available."

access:
  badge: "Accessibility"
  headline: "Access via LAN or access point."
  text: "The web interface can be reached via the device's LAN port. If LAN is not available, each device opens its own Wi-Fi network in factory state, which you can connect to. The credentials are unique to each device. Via this access point, the device can then also be added to your own Wi-Fi network."

offline:
  badge: "Self-sufficient"
  headline: "Works without internet."
  text: 'We make sure that our devices work without an internet connection. Purely local operation is possible. Features like <a href="/en/solutions/pv-excess-charging" class="prose-link">PV excess charging</a>, battery control and heating work without internet too.'
  text2: 'Naturally, an internet connection is required when features like solar forecast, <a href="/en/solutions/dynamic-tariff" class="prose-link">dynamic tariff</a> or remote access are enabled.'
