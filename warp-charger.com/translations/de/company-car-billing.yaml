title: "Dienstwagenabrechnung"
description: "Ladelogbuch lokal und kostenfrei erstellen. Komplett ohne Cloud!"

badge: "Dienstwagenabrechnung"
subtitle: "Ladelogbuch lokal und kostenfrei erstellen. Komplett ohne Cloud!"

chargelog:
  badge: "Ladelogbuch"
  headline: "Ladelogbuch mit WARP4"
  intro: 'Mit dem <a href="/de/produkte/warp4-charger" class="prose-link">WARP4 Charger Pro</a> können Ladevorgänge lokal auf der Wallbox, das heißt ohne eine Cloud, aufgezeichnet werden. Ein Ladevorgang kann mit einer der beiliegenden NFC (RFID) Karten gestartet werden und wird beendet wenn das Auto von der Wallbox getrennt wird.'
  recorded_heading: "Für jeden Ladevorgang werden folgende Informationen gespeichert:"
  recorded_items:
    - "Startdatum und Zeit des Ladevorgangs"
    - "Benutzer, der den Ladevorgang gestartet hat"
    - "Zählerstand beim Start und Ende des Ladevorgangs, hieraus wird die geladene Energie in kWh berechnet"
    - "Dauer des Ladevorgangs"
  cost_info: "Aus diesen Informationen und dem konfigurierten Strompreis werden die Kosten der Ladevorgänge berechnet."
  export_info: "Das Ladelogbuch kann auf alle oder bestimmte Nutzer gefiltert werden und für eine beliebige Zeitspanne als PDF oder CSV heruntergeladen werden."
  example_link_text: "Beispiel-Ladelogbuch herunterladen"
  example_link_url: "https://www.warp-charger.com/documents/beispiel_ladelog.pdf"

billing:
  badge: "Abrechnung"
  headline: "Abrechnung gegenüber dem Arbeitgeber"
  intro: "Wenn ein Firmenfahrzeug zuhause an einer Wallbox geladen wird, ist der Ladevorgang nach § 3 Nr. 46 EStG steuerfrei! Dafür müssen diese Ladevorgänge allerdings rechtlich konform beim Arbeitgeber abgerechnet werden."
  highlight: "Auch ein automatischer Mailversand an den Arbeitgeber ist mit dem WARP4 Charger Pro ohne Cloud und ohne jegliche Zusatzkosten möglich!"
  features:
    - icon: "verified"
      title: "MID-konformer Zähler"
      text: "Im WARP4 Charger Pro ist der nach EU-Messgeräterichtlinie 2014/32/EU MID-konforme Zähler WM3M4 von Iskra verbaut."
    - icon: "edit_note"
      title: "Individueller Briefkopf"
      text: "In der Webapp kann ein Briefkopf des PDF-Ladelogs selbst definiert werden mit eigener Adresse, Informationen zum Firmenfahrzeug und mehr."
    - icon: "group"
      title: "Mehrbenutzerbetrieb"
      text: "Unterschiedlichen Nutzern können unterschiedliche NFC-Karten zugeordnet werden. Beim Erstellen des Ladelogbuchs können Firmen-Ladevorgänge gezielt herausgefiltert werden."
