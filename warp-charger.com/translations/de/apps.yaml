# Android/iOS Apps (DE)
title: "Android/iOS Apps"
description: "WARP Charger und WARP Energy Manager per App steuern, lokal und von unterwegs."

hero:
  badge: "Apps"
  headline: "WARP immer dabei."
  text: "Mit den WARP Apps für iOS und Android haben Sie Ihren WARP Charger und WARP Energy Manager immer im Blick. Ladestatus prüfen, Einstellungen ändern und Energieflüsse überwachen, direkt vom Smartphone."
  appstore_url: "https://apps.apple.com/us/app/warp-by-tinkerforge/id6736695801"
  appstore_label: "App Store"
  playstore_url: "https://play.google.com/store/apps/details?id=com.tinkerforge.warp"
  playstore_label: "Google Play"

remote:
  badge: "Fernzugriff"
  headline: "Zugriff von überall."
  text: "Über den integrierten Fernzugriff können Sie jederzeit und von überall auf Ihre Geräte zugreifen. Die Apps nutzen dafür eine verschlüsselte WireGuard-VPN-Verbindung über my.warp-charger.com."
  text2: 'Registrieren Sie sich kostenlos unter my.warp-charger.com, fügen Sie Ihr Gerät im <a href="/de/software/webinterface" class="prose-link">Webinterface</a> unter System → Fernzugriff hinzu, fertig. Einmal eingerichtet, genügt ein Fingertipp.'
  link_url: "https://my.warp-charger.com"
  link_label: "Jetzt registrieren"

privacy:
  badge: "Datenschutz"
  headline: "Ihre Daten gehören Ihnen."
  text: "Bei jeder Verbindung über den Fernzugriff wird ein eigenes, verschlüsseltes VPN aufgebaut, mit nur zwei Teilnehmern: Ihrem Gerät und Ihrer Wallbox. Niemand sonst kann Ihre Daten einsehen, nicht einmal wir."
  text2: "Alle Daten, bis auf Ihre E-Mail-Adresse und Ihren Nutzernamen, werden so verschlüsselt auf unserem Server gespeichert, dass auch wir sie nicht entschlüsseln können."

local:
  badge: "Lokal"
  headline: "Auch lokal nutzbar."
  text: "Die Apps funktionieren auch im lokalen Netzwerk, ganz ohne Fernzugriff oder Internetverbindung. Wenn sich Ihr Smartphone im selben WLAN wie die Wallbox befindet, verbinden sich die Apps direkt mit dem Gerät."
  hint: "Verfügbar mit dem nächsten App-Release."
