title: "Lastmanagement"
description: "Lastmanagement mit bis zu 64 WARP Chargern, statisch und dynamisch, ohne zusätzliche Hardware."

badge: "Lastmanagement"
subtitle: "Bis zu 64 WARP Charger intelligent verwalten, ohne Zusatzhardware"

static:
  badge: "Statisch"
  headline: "Statisches Lastmanagement"
  text: "Teilen sich mehrere Wallboxen eine gemeinsame Zuleitung, ist oftmals der Maximalstrom begrenzt. Das statische Lastmanagement verteilt einen festen Gesamtstrom auf bis zu 64 WARP Charger."
  text2: "Eine Wallbox wird als Lastmanager konfiguriert und steuert die weiteren Wallboxen im Verbund. Der verfügbare Strom wird gleichmäßig zwischen allen ladenden Wallboxen aufgeteilt. Wird ein weiteres Fahrzeug angeschlossen, wird automatisch umverteilt."
  highlight: "Keine Zusatzhardware erforderlich: Die WARP Charger übernehmen das Lastmanagement eigenständig!"

dynamic:
  badge: "Dynamisch"
  headline: "Dynamisches Lastmanagement"
  text: "In vielen Fällen teilen sich Wallboxen den Stromanschluss mit anderen Verbrauchern. Wenn diese ein- und ausgeschaltet werden, ändert sich der verfügbare Strom ständig."
  text2: "Das dynamische Lastmanagement überwacht den Phasenstrom am Netzanschluss mittels eines Stromzählers und regelt die Leistung der Wallboxen entsprechend. Dadurch wird sichergestellt, dass der maximale Phasenstrom nie überschritten wird und keine Sicherung auslöst."
  text3: "Als offene Plattform werden diverse Hersteller und Stromzähler unterstützt."
  cta_text: "Kompatible Geräte"
  cta_url: "/de/loesungen/maximale-kompatibilitaet#devices"

smart:
  badge: "Intelligent"
  headline: "Nicht einfach nur Ströme begrenzen"
  text: "Elektrofahrzeuge lassen sich nicht beliebig regeln: Mindestladeströme, Mindestladezeiten und Pausen müssen eingehalten werden. Das Lastmanagement der WARP Charger berücksichtigt diese Eigenheiten und verhindert Fehlerzustände."
  features:
    - icon: "balance"
      title: "Faire Verteilung"
      desc: "Steht nicht genug Strom für alle Fahrzeuge zur Verfügung, wird reihum geladen: maximale Anzahl gleichzeitiger Ladevorgänge bei fairem Wechsel."
    - icon: "swap_horiz"
      title: "Phasenrotation"
      desc: "Phasenbelegung und -rotation der Wallboxen werden beachtet, um mehr Fahrzeuge parallel zu laden und Limits besser auszureizen."
    - icon: "speed"
      title: "Realer Strombezug"
      desc: "WARP Charger Pro messen den tatsächlichen Phasenstrom. Ungenutzter Strom wird automatisch anderen Wallboxen zugewiesen."
    - icon: "trending_down"
      title: "Minimale Schaltvorgänge"
      desc: "Der Lastmanager versucht Schaltvorgänge zu minimieren und sorgt für einen stabilen Ladebetrieb."

config:
  badge: "Konfiguration"
  headline: "Einfache Einrichtung"
  text: "Das Lastmanagement wird direkt im Webinterface der WARP Charger konfiguriert:"
  steps:
    - title: "Fremdsteuerung aktivieren"
      desc: "Auf allen gesteuerten Wallboxen den Fremdsteuerungsmodus aktivieren."
    - title: "Lastmanager konfigurieren"
      desc: "Eine Wallbox oder den WARP Energy Manager als Lastmanager festlegen und Wallboxen hinzufügen."
    - title: "Gesamtstrom festlegen"
      desc: "Den maximalen Gesamtstrom der gemeinsamen Zuleitung konfigurieren."
    - title: "Optional: Dynamisch aktivieren"
      desc: "Stromzähler am Hausanschluss konfigurieren und dynamisches Lastmanagement einschalten."
