# Unternehmen / Company page translations (DE)
title: "Unternehmen"
description: "Tinkerforge GmbH: Das Team hinter WARP. Open Source Ladelösungen, Made in Germany."

badge: "Unternehmen"
badge_icon: "apartment"
headline: "Das Team hinter WARP"
intro: >
  WARP ist die Elektromobilitätssparte von Tinkerforge. Die Tinkerforge GmbH ist ein 2011
  gegründetes Unternehmen mit Sitz in Schloß Holte-Stukenbrock, Deutschland. Wir entwickeln
  und fertigen Open Source Ladelösungen. Echtes Made in Germany.

# About section
about:
  badge: "Über uns"
  badge_icon: "info"
  headline: "Wer wir sind"
  text: >
    Wir bei Tinkerforge sind der Meinung, dass Produkte offen sein müssen. Nur so gehören sie
    wirklich den Nutzern. Daher folgen wir der Open-Source-Philosophie, indem wir die Quelltexte
    sowie Baupläne all unserer Soft- und Hardware veröffentlichen und ermöglichen es so jedem
    Einzelnen, unsere Produkte nach eigenen Wünschen zu verändern und zu erweitern.
  text2: >
    Durch die enge Zusammenarbeit mit unserer aktiven Community entwickeln wir schnell
    kundenorientierte Lösungen. Von der Hardware-Entwicklung über die Softwareentwicklung bis hin
    zu Vertrieb und Versand, alles kommt aus einer Hand.

# Values / pillars
pillars:
  - icon: "code"
    title: "Open Source"
    text: "Sowohl die Hardware als auch die Software unserer Produkte sind Open Source. WARP4 Charger OSHWA UID DE000125."
  - icon: "flag"
    title: "Made in Germany"
    text: "Entwicklung und Fertigung in Schloß Holte-Stukenbrock, Deutschland. Echte Wertschöpfung vor Ort."
  - icon: "cloud_off"
    title: "Keine Cloud"
    text: "Unsere Produkte funktionieren ohne Cloud. Vollständig unabhängig nutzbar: WARP gehört dem Kunden."
  - icon: "build"
    title: "Modular & Nachhaltig"
    text: "Modularer Aufbau mit austauschbaren Komponenten. Defekte Teile lassen sich einzeln ersetzen."
  - icon: "verified"
    title: "3 Jahre Garantie"
    text: "Auf alle WARP Komponenten geben wir eine Garantie von drei Jahren."
  - icon: "handshake"
    title: "Direkter Kontakt"
    text: "Bei uns gibt es den direkten Kontakt zu den Ingenieuren und Entwicklern. Keine Callcenter."

