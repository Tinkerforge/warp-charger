title: "Förderung Mehrparteienhaus"
description: "Bundesförderung „Laden im Mehrparteienhaus“: bis zu 2000€ pro Ladepunkt. Alle WARP4 Charger sind förderfähig."

badge: "Förderung"
subtitle: "Laden im Mehrparteienhaus"

subsidy:
  badge: "Die Förderung"
  headline: "Bundesförderung „Laden im Mehrparteienhaus“"
  body_html: >
    Die Bundesförderung <a href="https://www.laden-im-mehrparteienhaus.de/" target="_blank" rel="noopener" class="prose-link">Laden im Mehrparteienhaus</a>
    ermöglicht die Förderung von Ladepunkten für Wohnungseigentümergemeinschaften (WEG),
    Privateigentümer von Mehrparteienhäusern und Stellplatzeigentümer. Es werden bis zu
    <strong>2000€ pro Ladepunkt</strong> gefördert für die Errichtung, Verkabelung und den Netzanschluss.
  conditions_html: >
    Pro Mehrparteienhaus müssen mindestens sechs Stellplätze sowie mindestens 20&nbsp;%
    aller zum Objekt gehörenden Stellplätze elektrifiziert werden. Weitere Bedingungen
    finden sich in den
    <a href="https://www.laden-im-mehrparteienhaus.de/faq-und-download/" target="_blank" rel="noopener" class="prose-link">FAQ zur Förderung</a>.

warp4:
  badge: "WARP4 Charger"
  headline: "Förderfähig ab Werk"
  body_html: >
    Alle <a href="/de/produkte/warp4-charger" class="prose-link">WARP4 Charger</a>
    sind förderfähig und unter der <strong>Tinkerforge GmbH</strong>
    in der Herstellerliste der Förderung zu finden.
  ladesaeule_html: >
    Unsere Ladesäulen sind in der Liste nicht aufgeführt, da diese nur zusammen mit
    einem oder zwei WARP4 Charger eingesetzt werden können.
