faq:
  eyebrow: "FAQs"
  heading: "Noch weitere Fragen?"
  section_icon: "help"
  group_name: "ladesaeule-faq"
  items:
    - question: "Welche Wallboxen passen an die WARP4 Ladesäule?"
      answer_html: "Die Ladesäule ist für den <a href=\"/de/produkte/warp4-charger\" class=\"prose-link\">WARP4 Charger</a> in den Varianten Smart und Pro konstruiert. Vorder- und Rückseite können unabhängig bestückt werden, auch unterschiedliche Varianten lassen sich kombinieren."
    - question: "Welche Oberfläche bzw. Farbe ist verfügbar?"
      answer_html: "Die neue WARP4 Ladesäule wird ausschließlich in DB703 pulverbeschichtet gefertigt, einem dunklen Anthrazit-Grau mit hoher UV- und Witterungsbeständigkeit. Andere Farben sind auf Anfrage möglich."
    - question: "Wie wird die Ladesäule befestigt?"
      answer_html: "Die Ladesäule wird auf ein vorbereitetes Fundament aufgesetzt und von innen verschraubt. Die mitgelieferte Stahl-Schablone (Montagehilfe) positioniert die Befestigungsschrauben präzise, bevor das Fundament aushärtet."
    - question: "Sind die WARP4 Charger im Lieferumfang enthalten?"
      answer_html: "Nein. Die WARP4 Ladesäule wird mit integrierten Verteilergehäusen geliefert, in denen Strom- und Netzwerkanschluss zentral aufgelegt werden. Die WARP4 Charger werden separat bestellt und müssen dann nur noch in die Säule eingesetzt und an das Verteilergehäuse angeschlossen werden."
    - question: "Was ist der Unterschied der Ladesäule für 1 Wallbox und 2 Wallboxen?"
      answer_html: "Das obere Teil der Rückseite ist bei der Variante für eine Wallbox geschlossen (ohne Bohrungen). Bei der Variante für 2 Wallboxen verfügt dieses Teil über Bohrungen für die zweite Wallbox."
    - question: "Kann die Ladesäule von 1 Wallbox auf 2 Wallboxen umgerüstet werden?"
      answer_html: "Ja, das obere Teil der Rückseite ist bei der Variante für eine Wallbox geschlossen (ohne Bohrungen). Dieses Teil kann einfach durch ein Element mit Bohrungen für eine Wallbox getauscht werden."
    - question: "Ist die Ladesäule für den Außenbereich geeignet?"
      answer_html: "Ja. Das Gehäuse ist IP54-geschützt und durchgängig gekantet (ohne Schweißnähte). In Verbindung mit der DB703-Pulverbeschichtung ist die Säule für die ganzjährige Außenaufstellung freigegeben."
    - question: "Wie hoch sind Lieferzeit und Garantie?"
      answer_html: "Die WARP4 Ladesäule wird auftragsbezogen in Schloß Holte-Stukenbrock gefertigt. Auf das Produkt gewähren wir 3 Jahre Garantie."
    - question: "Wer darf die Ladesäule installieren?"
      answer_html: "Die elektrische Installation und Anmeldung beim Netzbetreiber muss durch eine qualifizierte Elektrofachkraft erfolgen. Die mechanische Aufstellung lässt sich problemlos mit handwerklichen Standardwerkzeugen durchführen."

