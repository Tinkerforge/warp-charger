title: "Dynamische Strompreise"
description: "Dynamische Strompreise mit WARP nutzen: Elektrofahrzeuge und Wärmepumpen automatisch zu günstigen Zeiten betreiben."

badge: "Dynamische Strompreise"
subtitle: "Günstigen Strom für Verbraucher nutzen."

intro:
  badge: "Kosten sparen"
  headline: "Günstigen Strom nutzen."
  text: "Mit einem dynamischen Stromtarif können Kosten gespart werden, wenn der Verbrauch in die günstigen Stunden verschoben wird."
  text2: 'WARP Charger können im <a href="/de/loesungen/pv-ueberschussladen" class="prose-link">Eco-Modus</a> automatisch das Laden eines Fahrzeugs in die günstigen Stunden verschieben. Der <a href="/de/produkte/warp-energy-manager" class="prose-link">WARP Energy Manager</a> kann dynamische Strompreise nutzen, um eine Wärmepumpe mittels SG-Ready-Schnittstelle bei günstigen Preisen in den erweiterten Betrieb zu versetzen.'
  highlight: "Die dynamischen Erzeugerpreise werden automatisch von der Strombörse ENTSO-E bezogen. Alle weiteren Strompreisbestandteile sind manuell konfigurierbar, somit werden alle Stromanbieter unterstützt!"

eco:
  badge: "Eco-Modus"
  headline: "Optimierung von Ladevorgängen."
  text: "WARP Charger Smart und Pro verfügen über verschiedene wählbare Lademodi. Im Eco-Lademodus definiert der Nutzer die gewünschte Abfahrtszeit und die Ladedauer."
  text2: 'Die Wallbox berechnet anschließend einen Ladeplan unter Berücksichtigung der prognostizierten PV-Erzeugung und der dynamischen Strompreise. Im Eco-Modus wird versucht, das Fahrzeug möglichst mittels <a href="/de/loesungen/pv-ueberschussladen" class="prose-link">PV-Strom</a> zu laden. Sind die prognostizierten PV-Erträge zu gering, werden die Stunden mit den geringsten Stromkosten genutzt.'

sgready:
  badge: "SG-Ready"
  headline: "Steuerung von Wärmepumpen."
  text: "Gerade bei Neubauten kann der Zeitpunkt, an dem eine Wärmepumpe läuft, in die günstigen Stunden verschoben werden."
  text2: 'Der <a href="/de/produkte/warp-energy-manager" class="prose-link">WARP Energy Manager</a> kann Wärmepumpen mittels SG-Ready-Schnittstelle ansteuern. In Stunden mit günstigen Strompreisen wird die Wärmepumpe in den erweiterten Betrieb versetzt: Warmwasser und Heizkreislauf werden auf höhere Temperaturen gebracht, um anschließend längere Zeit zu überbrücken.'
  text3: "Zusätzlich kann die Wärmepumpe in Stunden teurer Strompreise gesperrt werden, so dass in diesen Zeiten kein Strom von der Wärmepumpe bezogen wird."

battery:
  badge: "Batteriespeicher"
  headline: "Netzdienliche Batteriesteuerung."
  text: 'Der <a href="/de/produkte/warp-energy-manager" class="prose-link">WARP Energy Manager</a> kann Batteriespeicher netzdienlich einsetzen: In Zeiten günstiger Strompreise wird der Speicher geladen. Ist der Strompreis hoch, wird der Speicher genutzt und somit wieder entladen.'

pricing:
  badge: "Preisberechnung"
  headline: "Flexible Preiskonfiguration."
  text: "Anstatt für jeden Stromanbieter eine andere Schnittstelle zu implementieren, bezieht das System die Day-Ahead-Preise vom Verband Europäischer Übertragungsnetzbetreiber (ENTSO-E)."
  text2: "Der dynamische Strompreis setzt sich aus den Börsenpreisen sowie anbieterspezifischen Zusatzkosten (Netzentgelte, Steuern, Preisaufschläge, MwSt) zusammen. Diese können dem jeweiligen Anbieter entsprechend konfiguriert werden."
  features:
    - icon: "public"
      title: "ENTSO-E Integration"
      desc: "Day-Ahead-Preise werden automatisch von der europäischen Strombörse bezogen."
    - icon: "calculate"
      title: "Konfigurierbare Zusatzkosten"
      desc: "Netzentgelte, Steuern und MwSt individuell konfigurierbar, passend zu jedem Anbieter."
    - icon: "calendar_month"
      title: "Preiskalender"
      desc: 'Feste Preise oder Aufschläge pro Wochentag und Viertelstunde definierbar, ideal für <a href="/de/loesungen/14a-enwg" class="prose-link">§14a EnWG zeitvariable Netzentgelte</a>.'
