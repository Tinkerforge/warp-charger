# WARP für Architekten (DE)
title: "WARP für Architekten"
description: "WARP Charger: die Designer-Wallbox für anspruchsvolle Architekturprojekte."

hero:
  badge: "WARP für Architekten"
  headline: "Ladeinfrastruktur, die zum Gebäude passt."

design:
  badge: "Design"
  headline: "Die Designer-Wallbox"
  text: "Der WARP Charger fügt sich mit seinem minimalistischen Design nahtlos in jede Architektur ein. Klare Linien, hochwertige Materialien und eine kompakte Bauform machen ihn zur ersten Wahl für designbewusste Projekte."

materials:
  badge: "Materialien"
  headline: "DB703 / Edelstahl"
  text: "Erhältlich pulverbeschichtet (DB703 Eisenglimmer) oder in gebürstetem Edelstahl. Beide Varianten sind witterungsbeständig, langlebig und fügen sich harmonisch in moderne Fassaden und Außenbereiche ein."

custom:
  badge: "Individualisierung"
  headline: "Kundenspezifische Lösungen"
  text: "Die WARP Wallbox lässt sich individuell anpassen. Eigene Gravuren, verschiedene Beschichtungen und Sonderkonfigurationen sind auf Anfrage möglich, ideal für Projekte mit besonderen Gestaltungsanforderungen."

quality:
  badge: "Qualität"
  headline: "Qualitativ und langlebig"
  text: "Entwicklung und Fertigung in Deutschland mit 3 Jahren Garantie. Modularer Aufbau ermöglicht den Austausch einzelner Komponenten. Ein Produkt, das so lange hält wie das Gebäude."

compact:
  badge: "Bauform"
  headline: "Kompakt und unauffällig"
  text: "Mit ihren kompakten Abmessungen ist die WARP Wallbox eine der kleinsten Wallboxen am Markt. Sie lässt sich diskret an Wänden, in Garagen oder an Ladesäulen montieren, ohne den architektonischen Gesamteindruck zu stören."
