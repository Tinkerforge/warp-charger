title: "WARP für Firmen"
description: "Lastmanagement, zentrale Nutzerverwaltung und langlebige Hardware: WARP Charger für den Einsatz im Unternehmen."

badge: "WARP für Firmen"
subtitle: "WARP Charger für den Firmeneinsatz."

load_management:
  badge: "Lastmanagement"
  headline: "Mehr Wallboxen am bestehenden Netzanschluss."
  body_html: >
    Bei Firmen sollen oft mehrere Lademöglichkeiten installiert werden. Mit dem
    integrierten Lastmanagement lassen sich Wallboxen auch dann installieren,
    wenn der Netzanschluss nicht für die volle Anzahl der Wallboxen ausgelegt ist.
  link_url: "/de/loesungen/lastmanagement"
  link_label: "Mehr über Lastmanagement"

users:
  badge: "Zentrale Nutzerverwaltung"
  headline: "Zugriff lokal verwalten, ohne Cloud."
  body_html: >
    Der Lastmanager kann alle Nutzer des Ladeparks zentral verwalten. Die Ladefreigabe
    erfolgt lokal, ohne Cloud und ohne laufende Kosten.
  log_html: >
    Auch eine Zuordnung der lokal aufgezeichneten Ladevorgänge zu einzelnen Nutzern
    ist möglich.

quality:
  badge: "Haltbar und qualitativ"
  headline: "Investitionssicherheit durch modulare Hardware."
  body_html: >
    Wer in seine Infrastruktur investiert, möchte, dass diese eine lange Haltbarkeit
    besitzt. WARP Charger bestehen aus hochwertigen Komponenten und sind modular
    aufgebaut.
  repair_html: >
    Sollte doch einmal etwas defekt sein, lässt es sich einfach und kostengünstig
    austauschen.

made_in_germany:
  badge: "Made in Germany"
  headline: "Direkter Draht zum Hersteller."
  body_html: >
    WARP Charger werden in Deutschland entwickelt und gefertigt. Wir als Hersteller
    sind bei Fragen oder Problemen direkt erreichbar.
  link_url: "/de/ueber-uns/unternehmen#made-in-germany"
  link_label: "Mehr über Made in Germany"
