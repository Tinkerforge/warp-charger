  paragraph2: "Passen Sie das Ladeverhalten an Ihre Bedürfnisse an. Nutzen Sie intelligente Features wie das PV-Überschussladen, um Ihr Fahrzeug umweltfreundlich mit dem eigenen Sonnenstrom zu laden, oder definieren Sie individuelle Ladezeiten."
