faq:
  eyebrow: "FAQs"
  heading: "Noch weitere Fragen?"
  section_icon: "help"
  group_name: "wem-faq"
  items:
    - question: "Funktioniert der WARP Energy Manager auch ohne Internetzugang/Cloud?"
      answer_html: "Die gesamte Steuerung und Auswertung läuft lokal auf dem Energy Manager. Funktionen wie PV-Ertragsprognose, die Nutzung dynamischer Strompreise oder die Nutzung der Apps setzen eine Internetverbindung voraus."
    - question: "Muss ich alle Funktionen nutzen?"
      answer_html: "Nein. Sie können einzelne Bausteine aktivieren, zum Beispiel nur dynamische Strompreise mit Wärmepumpe, und später erweitern."
    - question: "Welche Wärmepumpen werden unterstützt?"
      answer_html: "Alle Wärmepumpen mit SG-Ready Schnittstelle. Der Energy Manager kann den erweiterten Betrieb anfordern, den Normalbetrieb beibehalten oder die Wärmepumpe sperren."
    - question: "Wie viele WARP Charger kann ich anbinden?"
      answer_html: "Bis zu 64 <a href=\"/de/produkte/warp4-charger\" class=\"prose-link\">WARP4 Charger</a> in einem Verbund, ohne zusätzliche Lastmanagement-Hardware. Statisch und dynamisch möglich."
    - question: "Welche Wechselrichter und Stromzähler werden unterstützt?"
      answer_html: "Über 100 Geräte der gängigen Hersteller. Die <a href=\"/de/loesungen/maximale-kompatibilitaet\" class=\"prose-link\">vollständige Kompatibilitätsliste</a> finden Sie auf unserer Lösungen-Seite."
    - question: "Kann der WARP Energy Manager auch meinen Heimspeicher steuern?"
      answer_html: "Das Auslesen vieler Speichersysteme funktioniert bereits heute. Die aktive Steuerung (Laden und Entladen) befindet sich gerade im Aufbau. Erste Geräte werden bereits unterstützt. Die <a href=\"/de/loesungen/maximale-kompatibilitaet\" class=\"prose-link\">vollständige Kompatibilitätsliste</a> finden Sie auf unserer Lösungen-Seite."
    - question: "Wo wird der Energy Manager montiert?"
      answer_html: "In der Verteilung auf der Hutschiene (4 TE). Anschlüsse für Netzwerk, Relais, Eingänge und Modbus RTU (RS485) erfolgen direkt am Modul."
    - question: "Wie werden meine Verbrauchsdaten aufgezeichnet?"
      answer_html: "Der WARP Energy Manager zeichnet die Verbrauchsdaten ausschließlich lokal auf dem Gerät auf. Es findet keine Übertragung in eine Cloud o.ä. statt."
    - question: "Ist die Hardware Open Source?"
      answer_html: "Ja. Sowohl die Hardware-Designdateien als auch die Firmware sind vollständig Open Source. Eigene Erweiterungen und Integrationen sind ausdrücklich erwünscht."

