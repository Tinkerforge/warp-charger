intro:
  badge: "Was ist der Energy Manager 2.0?"
  headline: "Lokale Steuerung für PV, Wärmepumpe, Wallboxen und Hausspeicher"
  body_html: >
    Der WARP Energy Manager 2.0 ist die intelligente Schaltzentrale für das
    Energiemanagement zu Hause. Abhängig vom aktuellen <strong>dynamischen
    Strompreis</strong>, dem <strong>PV-Überschuss</strong> oder einer
    Leistungsbegrenzung nach <strong>§14a EnWG</strong> steuert er
    Wärmepumpe (SG-Ready), bis zu 64
    <a href="/de/produkte/warp4-charger" class="prose-link"><strong>WARP4 Charger</strong></a>
    Wallboxen, einen Hausspeicher und weitere Verbraucher.
  body2_html: >
    Die gesamte Steuerung und Datenaufzeichnung läuft <strong>lokal</strong> auf dem Energy Manager,
    nicht in der Cloud. Hardware und Software sind vollständig Open Source und
    werden in Deutschland entwickelt und gefertigt.

