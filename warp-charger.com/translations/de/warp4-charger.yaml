      body_html: "Ermöglicht Autocharge, also die Identifikation des Fahrzeugs über das Ladekabel. Der SoC kann ausgelesen werden. Pro-Version: Hardwareseitig vorbereitet für bidirektionales Laden (V2H/V2G)."
