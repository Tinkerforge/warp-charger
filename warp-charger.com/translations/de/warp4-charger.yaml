faq:
  eyebrow: "FAQs"
  heading: "Noch weitere Fragen?"
  section_icon: "help"
  group_name: "warp4-faq"
  items:
    - question: "Wer darf den WARP4 Charger installieren?"
      answer_html: "Die Installation muss durch eine qualifizierte Elektrofachkraft erfolgen. Diese kümmert sich auch um die erforderliche Anmeldung beim Netzbetreiber."
    - question: "Benötige ich einen FI Typ B?"
      answer_html: "Nein. Die WARP4 verfügt über eine integrierte DC-Fehlerstromerkennung (RDC-DD). Ein FI Typ A in der hausinternen Installation ist ausreichend."
    - question: "Funktioniert WARP4 auch ohne Internetzugang/ ohne Cloud?"
      answer_html: "Alle Funktionen der WARP4 laufen lokal auf der Wallbox. Bedienung und Konfiguration erfolgen über das integrierte Webinterface im eigenen Heimnetzwerk, ganz ohne Cloud-Zwang. Einzig Funktionen wie PV-Ertragsprognose, die Nutzung dynamischer Strompreise oder die Nutzung der Apps setzen eine Internetverbindung voraus."
    - question: "Wie binde ich die Wallbox ins Smart Home ein?"
      answer_html: "Die WARP4 unterstützt offene Standards wie MQTT, Modbus TCP und HTTP-API. Damit lässt sie sich nahtlos in Home Assistant, ioBroker, openHAB und weitere Smart-Home-Systeme integrieren."
    - question: "Wie verbinde ich die Wallbox mit meiner bestehenden PV-Anlage?"
      answer_html: "Wir unterstützen über 100 Geräte anderer Hersteller und können direkt auf die Daten von Stromzählern, PV-Wechselrichtern und Speichern zugreifen. Die Installation zusätzlicher Hardware, z.B. eines extra Stromzählers für die Wallbox, entfällt somit meist, da bestehende Hardware von der Wallbox genutzt werden kann. Die <a href=\"/de/loesungen/maximale-kompatibilitaet\" class=\"prose-link\">vollständige Kompatibilitätsliste</a> finden Sie auf unserer Lösungen-Seite."
    - question: "Welche Geräte werden unterstützt?"
      answer_html: "Die WARP4 kommuniziert mit zahlreichen Smart-Metern, PV-Wechselrichtern, Stromspeichern und Wärmepumpen verschiedener Hersteller. Eine vollständige Kompatibilitätsliste finden Sie in der Dokumentation."
    - question: "Warum ist nur die Pro Version für das bidirektionale Laden vorbereitet und kann den SoC auslesen?"
      answer_html: "Nur die Pro Version verfügt über einen Stromzähler. Wir gehen davon aus, dass dieser für das bidirektionale Laden notwendig ist, um auf Probleme mit dem Stromnetz zu reagieren (NA-Schutz). Der SoC eines Fahrzeugs kann per ISO15118-2 ausgelesen werden, allerdings leider nicht während eines laufenden Ladevorgangs. Die Pro kann während des Ladevorgangs den Ladezustand über den Stromzähler mitrechnen."
    - question: "Welche Variante ist abrechnungsgeeignet?"
      answer_html: "Für eine Abrechnung, etwa bei Dienstwagen oder am Arbeitsplatz, empfehlen wir die WARP4 Pro mit MID-zertifiziertem Zähler und Ladelogbuch mit Energieerfassung. Für Anwendungen, bei denen eine eichrechtskonforme Lösung benötigt wird, ist WARP4 zurzeit nicht geeignet."
    - question: "Was ist der Unterschied zwischen MID-geeicht und eichrechtskonform?"
      answer_html: "Der Stromzähler der Pro Version ist MID-geeicht. Dies bezieht sich auf die Messgenauigkeit des Stromzählers. Der Begriff \"eichrechtskonforme Wallbox\" bezieht sich nicht nur auf den Stromzähler, sondern auf die gesamte Wallbox. So muss der Stromzähler jeden Ladevorgang signieren. Die Daten werden hochgeladen und in der Transparenzsoftware bereitgestellt. Theoretisch kann damit ein Nutzer nachsehen ob die Abrechnung korrekt erfolgte. Zusätzlich muss die Wallbox manipulationsgeschützt sein. Dies führt dazu, dass viele Teile in der Wallbox verplombt sind und nicht einfach von einem Elektriker getauscht werden können. Nach Ablauf der Eichfrist von 8 Jahren darf die Wallbox nicht mehr für Abrechnungszwecke verwendet werden. Ein Tausch des Stromzählers ist nur durch den Hersteller möglich."
    - question: "Ist die Wallbox über die \"Förderung Laden im Mehrparteienhaus\" förderfähig?"
      answer_html: "Ja, WARP4 steht in der Liste der förderfähigen Wallboxen unter unserem Firmennamen \"Tinkerforge GmbH\"."
    - question: "Erfüllt WARP4 den §14a EnWG?"
      answer_html: "Ja. Die WARP4 unterstützt die netzdienliche Steuerung nach §14a EnWG inklusive EEBUS-Schnittstelle zur Kommunikation mit dem Steuerbox-Standard des Netzbetreibers."

tech_specs:
  heading: "Technische Spezifikationen"
  footnote: "* abhängig von Variante/Ausstattung"
  groups:
    - title: "Elektrische Leistungsdaten"
      rows:
        - { label: "Ladestandard",        value: "DIN EN 61851-1 / ISO 15118-2 / (ISO 15118-20 über Softwareupdate)" }
        - { label: "Ladeleistung",        value: "1,4 kW bis 11 kW / 22 kW *" }
        - { label: "Nennspannung",        value: "230 V / 400 V / 1/3 AC" }
        - { label: "Nennfrequenz",        value: "50 Hz" }
        - { label: "Nennstrom",           value: "16 A / 32 A *" }
        - { label: "Phasenumschaltung",   value: "Intern zwischen ein- und dreiphasig" }
        - { label: "Fehlerstromerkennung", value: "DC 6 mA (integriert)" }
        - { label: "Strommessung (nur Pro)",        value: "Integrierter MID-geeichter Stromzähler nach EU-Messgeräterichtlinie 2014/32/EU *" }
        - { label: "Standby (WLAN an)", value: "Smart ≤ 3 W; Pro ≤ 5 W *" }
    - title: "Anschluss & Verkabelung"
      rows:
        - { label: "Fahrzeugladestecker",  value: "Typ 2" }
        - { label: "Ladekabellänge",       value: "5,0 m / 7,5 m / Sonderlänge*" }
        - { label: "Zuleitungsquerschnitt", value: "2,5 mm² bis 10 mm²" }
        - { label: "Zuleitungseinführung", value: "M32 - Von der Unterseite und Rückseite möglich" }
        - { label: "Zuleitungsdurchmesser", value: "11 mm bis 21 mm" }
        - { label: "Datenleitungseinführung", value: "M25 - Von der Unterseite und Rückseite möglich, M25 Dichteinsatz mit 2x 9 mm Bohrungen" }
    - title: "Mechanik & Gehäuse"
      rows:
        - { label: "Abmessungen",       value: "280 × 215 × 95 mm (B/H/T)" }
        - { label: "Gewicht",           value: "ca. 8 kg (je nach Kabellänge) *" }
        - { label: "Schutzart",         value: "IP54 (spritzwassergeschützt, für den Außenbereich geeignet)" }
        - { label: "Schlagfestigkeit",  value: "Gehäuse IK09 (7 Joule nach EN 60079-0)" }
        - { label: "Betriebstemperatur", value: "-25 °C bis +50 °C (Durchschnitt in 24h: <35 °C)" }
    - title: "Kommunikation & Schnittstellen"
      rows:
        - { label: "Schnittstellen",       value: "HTTP, MQTT, EEBUS, Modbus/TCP, OCPP, SunSpec" }
        - { label: "§14a EnWG steuerbar",  value: "Mittels internem Abschalteingang, über Schnittstellen oder WARP Energy Manager" }
    - title: "Zugang & Benutzerverwaltung"
      rows:
        - { label: "Zugangsverriegelung", value: "NFC (RFID), Webinterface, Android / iOS App, Autocharge, API" }
        - { label: "NFC-Tags",            value: "3 NFC-Karten im Lieferumfang, max. 32 anlernbar" }
        - { label: "Benutzer",            value: "Max. 32 konfigurierbar" }
    - title: "Features"
      rows:
        - { label: "Stromzähler",    value: "Zugriff auf Messwerte von Stromzählern, Wechselrichtern, Batteriespeichern über das Netzwerk. Mehr als 100 Fremd-Geräte unterstützt." }
        - { label: "Lastmanagement",    value: "Statisch/dynamisch integriert, kann als Lastmanager für max. 64 WARP Charger konfiguriert werden." }
        - { label: "Zentrale Verwaltung", value: "Lastmanager kann optional die Benutzerverwaltung und das Ladelogbuch zentral übernehmen." }
        - { label: "Dynamische Strompreise",    value: "Unterstützung aller Tarife. Strompreise von Strombörse ENTSO-E. Aufschläge definierbar. Preiskalender konfigurierbar mit Aufschlägen pro Wochentag und Uhrzeit." }
        - { label: "Eco-Modus",    value: "Automatische kostenoptimierte Ladung bis zu definierbarer Abfahrtszeit. Nutzung von PV-Prognosedaten, PV-Überschussladen und dyn. Strompreise." }
        - { label: "PV-Prognose",    value: "Mittels api.forecast.solar. Bis zu 6 PV-Flächen definierbar." }
        - { label: "PV-Überschussladen",    value: "Beachtet Messwerte vom Netzanschluss und Batteriespeicher. Automatische Phasenumschaltung." }
        - { label: "Batteriesteuerung",    value: "Ermöglicht die Steuerung das Lade- und Entladeverhaltens von Batteriespeichern. Bis zu 64 Regeln definierbar." }
        - { label: "Automatisierungsregeln",    value: "Bis zu 14 Regeln definierbar um eigene Automatisierungen ohne Programmieren umzusetzen." }
        - { label: "Ladelogbuch",    value: "Der Ladetracker zeichnet bis zu 32768 Ladevorgänge lokal auf der Wallbox auf. Nur Pro Version: Inkl. geladene Energie." }
    - title: "Lieferumfang"
      rows:
        - { label: "Lieferumfang", value: "Wallbox, Bedienungsanleitung inkl. Installationsanleitung, Prüfprotokoll, 3 NFC Karten" }

