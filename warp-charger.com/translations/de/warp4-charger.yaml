intro:
  badge_icon: "help"
  badge_text: "Was ist der WARP4 Charger?"
  headline: "Die Wallbox mit Vollausstattung."
  body1: "Der WARP4 Charger ist die hochwertige Open-Source-Wallbox mit bis zu 22 kW Ladeleistung, Made in Germany. Sie ist auf eine lange Lebensdauer ausgelegt, modular aufgebaut und bereits für das bidirektionale Laden vorbereitet."
  body2: "Dank der Kompatibilität zu über 100 Geräten anderer Hersteller (darunter Stromzähler, PV-Wechselrichter und Batteriespeicher) lässt sie sich einfach in bestehende Systeme integrieren."
  body3: "Als Wallbox mit Vollausstattung bietet der WARP4 Charger ein integriertes PV-Überschussladen, den Eco-Modus zur intelligenten Verknüpfung von PV-Prognosedaten, dynamischen Strompreisen und PV-Überschuss, ein statisches oder dynamisches Lastmanagement über das Netzwerk sowie zahlreiche offene Schnittstellen."

