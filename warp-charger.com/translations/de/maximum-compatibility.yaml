title: "Maximale Kompatibilität"
description: "Über 100 kompatible Geräte: Wechselrichter, Batteriespeicher, Stromzähler und mehr. Offene Schnittstellen für maximale Flexibilität."

badge: "Kompatibilität"
subtitle: "Über 100 kompatible Geräte, offene Schnittstellen für maximale Flexibilität."

intro:
  badge: "Offene Plattform"
  headline: "Keine Herstellerbindung."
  text: "WARP Charger und WARP Energy Manager setzen auf offene Schnittstellen und standardisierte Protokolle. Dadurch sind sie mit einer Vielzahl von Wechselrichtern, Batteriespeichern und Stromzählern kompatibel, unabhängig vom Hersteller."
  text2: "Die Kompatibilitätsliste wächst stetig. Durch Modbus/TCP mit benutzerdefinierbaren Registertabellen können auch Geräte angebunden werden, die von uns noch nicht unterstützt werden."
  cta_text: "Einführung"
  cta_url: "https://docs.warp-charger.com/de/docs/compatible_devices/introduction"

interfaces:
  badge: "Schnittstellen"
  headline: "Viele Möglichkeiten."
  text: "Eine breite Auswahl an Schnittstellen ermöglicht die Anbindung unterschiedlichster Geräte:"
  list:
    - icon: "lan"
      title: "SunSpec"
      desc: "Automatische Erkennung von Wechselrichtern und Stromzählern über das SunSpec-Profil via Modbus/TCP."
    - icon: "settings_ethernet"
      title: "Modbus/TCP"
      desc: "Vordefinierte Registertabellen für über 60 Geräte, plus benutzerdefinierte Tabellen für beliebige Modbus-Geräte."
    - icon: "cable"
      title: "Modbus/RTU"
      desc: "Anbindung von RS485-Geräten über USB-Konverter oder den integrierten RS485-Port des WARP Energy Managers."
    - icon: "wifi"
      title: "SMA Speedwire"
      desc: "Native Unterstützung für SMA Sunny Boy, Sunny Tripower und SMA Energy Meter / Home Manager."
    - icon: "api"
      title: "HTTP/MQTT API"
      desc: "Push- und Pull-Schnittstelle für die Integration in eigene Systeme und Smart-Home-Plattformen."
    - icon: "battery_charging_full"
      title: "RCT Power Serial"
      desc: "Direkte Anbindung von RCT Power Batteriespeichern über das proprietäre Protokoll."

devices:
  badge: "Geräte"
  headline: "Über 100 unterstützte Geräte."
  text: "Wechselrichter, Batteriespeicher und Stromzähler zahlreicher Hersteller werden unterstützt, als Messquelle für PV-Überschussladen, dynamisches Lastmanagement und Batteriesteuerung."
  label_interfaces: "Schnittstellen"
  label_measurement: "Messpunkte"
  label_models: "Modelle (Auswahl)"
  label_docs: "Dokumentation"
  categories:
    - title: "Wechselrichter / Hybrid"
      entries: "Fronius, SMA, Huawei, SolarEdge, Kostal, Deye, Goodwe, Growatt, Solax, Solis, Sungrow, Victron, Fox ESS, Alpha ESS, E3DC, Hoymiles, APsystems"
    - title: "Batteriespeicher"
      entries: "BYD, Fronius, SMA, Huawei, Kostal, Deye, Goodwe, Growatt, Solax, Solis, Sungrow, Victron, Fox ESS, Alpha ESS, E3DC, RCT Power"
    - title: "Stromzähler"
      entries: "Shelly Pro 3EM, Eastron SDM, YTL, Eltako, Carlo Gavazzi, Siemens PAC, SMA Energy Meter / Home Manager"

measurement:
  badge: "Messpunkte"
  headline: "Flexibel einsetzbar."
  text: "Kompatible Geräte liefern Daten von verschiedenen Positionen im Hausnetz:"
  locations:
    - icon: "home"
      title: "Netzanschluss"
      desc: 'Für die Regelung des <a href="/de/loesungen/lastmanagement" class="prose-link">dynamischen Lastmanagements</a> und <a href="/de/loesungen/pv-ueberschussladen" class="prose-link">PV-Überschussladen</a>.'
    - icon: "solar_power"
      title: "PV-Erzeugung"
      desc: "Für PV-Überschussladen. Misst die aktuelle Erzeugungsleistung des Wechselrichters."
    - icon: "battery_horiz_075"
      title: "Batteriespeicher"
      desc: "Für koordiniertes Laden. Berücksichtigt Lade- und Entladeströme des Speichers."
    - icon: "bolt"
      title: "Verbraucher"
      desc: "Für detailliertes Monitoring. Erfasst den Verbrauch einzelner Geräte oder Gruppen."

battery_control:
  badge: "Batteriesteuerung"
  headline: "Speicher intelligent steuern."
  text: "WARP Charger und WARP Energy Manager können kompatible Batteriespeicher aktiv steuern, über Modbus/TCP mit sechs verschiedenen Modi:"
  modes:
    - title: "Standardverhalten"
      desc: "Der Speicher arbeitet nach eigener Logik ohne externe Steuerung."
    - title: "Laden blockieren"
      desc: "Verhindert das Laden des Speichers, z.B. um PV-Strom bevorzugt ins Auto zu laden."
    - title: "Entladen blockieren"
      desc: "Verhindert das Entladen, um gespeicherte Energie für später aufzuheben."
    - title: "Zwangsladen"
      desc: "Erzwingt das Laden des Speichers, z.B. bei günstigen Strompreisen."
    - title: "Zwangsentladen"
      desc: "Erzwingt das Entladen, z.B. vor Zeiten mit hohen Strompreisen."
    - title: "Extern gesteuert"
      desc: "Vollständige Steuerung der Lade-/Entladeleistung über externe Vorgabe."
