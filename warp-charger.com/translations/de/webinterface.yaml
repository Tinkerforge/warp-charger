# Lokales Webinterface (DE)
title: "Lokales Webinterface"
description: "WARP Charger und WARP Energy Manager mit lokalem Webinterface, ohne Internet oder Cloud."

hero:
  badge: "Lokales Webinterface"
  headline: "Direkter lokaler Zugriff"
  text: "WARP Charger und WARP Energy Manager verfügen über ein lokales Webinterface. Diese Webseite kann direkt auf dem Gerät aufgerufen werden und ist ohne Internet oder Cloud verfügbar. Über das Webinterface können die Geräte gesteuert werden und alle Einstellungen vorgenommen werden."

access:
  badge: "Erreichbarkeit"
  headline: "Zugriff per LAN oder Access Point"
  text: "Das Webinterface kann über den LAN-Anschluss des Geräts erreicht werden. Steht LAN nicht zur Verfügung, so öffnet jedes Gerät im Auslieferungszustand ein eigenes WLAN, mit dem man sich verbinden kann. Die Zugangsdaten hierzu sind individuell. Über diesen Access Point kann das Gerät dann auch in das eigene WLAN übernommen werden."

offline:
  badge: "Eigenständig"
  headline: "Funktioniert auch ohne Internet"
  text: "Wir legen Wert darauf, dass die Geräte auch ohne eine Verbindung zum Internet funktionieren. Ein rein lokaler Betrieb ist somit möglich. Funktionen wie PV-Überschussladen, Batterie- und Heizungssteuerung sind auch ohne möglich."
  text2: "Selbstverständlich wird aber eine Internetverbindung benötigt, wenn Funktionen wie eine PV-Prognose, dynamische Strompreise oder der Fernzugriff aktiviert werden."
