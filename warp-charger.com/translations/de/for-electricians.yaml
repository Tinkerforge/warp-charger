# WARP für Elektriker (DE)
title: "WARP für Elektriker"
description: "WARP Charger: die einfach zu installierende Wallbox für Elektrofachbetriebe."

hero:
  badge: "WARP für Elektriker"
  headline: "Durchdacht bis zur letzten Klemme."

installation:
  badge: "Installation"
  headline: "Einfach zu installieren"
  text: "Die WARP Wallbox ist für den Elektriker gemacht. Großzügiger Anschlussraum, übersichtliche Klemmen und eine logische Kabelführung sorgen dafür, dass die Installation schnell und fehlerfrei gelingt. Kein unnötiger Aufwand, keine versteckten Stolperfallen."

compatibility:
  badge: "Kompatibilität"
  headline: "Die Wallbox für alle Systeme"
  text: "Der WARP Charger ist kompatibel mit Energiemanagern, Wechselrichtern und Smart-Metern anderer Hersteller. Offene Schnittstellen (Modbus/TCP, SunSpec, HTTP, MQTT) ermöglichen die Integration in jedes bestehende System, ohne Herstellerbindung."
  cta_text: "Kompatible Geräte"
  cta_url: "/de/loesungen/maximale-kompatibilitaet#devices"

customization:
  badge: "Konfiguration"
  headline: "Individuell konfigurierbar"
  text: "Auf Wunsch mit eigener Gravur, verschiedenen Kabellängen und optionalem Tesla Opener verfügbar. So kann die Wallbox an die Anforderungen jedes Kunden angepasst werden."

charging_station:
  badge: "Ladesäule"
  headline: "Durchdachte Ladesäule"
  text: "Die WARP4 Ladesäule ist mehr als die oft üblichen Zaunpfosten für Wallboxen."
  points:
    - title: "Einfach aufzustellen"
      text: "Die mitgelieferte Montagehilfe erleichtert das Vorbereiten des Fundaments."
    - title: "Viel Platz für eigene Technik"
      text: "Großzügiger Innenraum für FI-Schutzschalter, Sicherungen oder zusätzliche Hardware wie Netzwerk-Switche oder LTE-Modems."
    - title: "Hochwertig, nicht nur ein Zaunpfosten"
      text: "2mm stark, pulverbeschichtet. Langlebig und witterungsbeständig."

modular:
  badge: "Aufbau"
  headline: "Modularer Aufbau"
  text: "Alle Komponenten sind einzeln austauschbar. Defekte Teile lassen sich ersetzen, ohne die gesamte Wallbox tauschen zu müssen. Das spart Zeit und Kosten, für Sie und Ihre Kunden."

support:
  badge: "Support"
  headline: "Direkter Kontakt & Support"
  text: "Bei uns sprechen Sie direkt mit den Ingenieuren und Entwicklern. Kein Callcenter, keine Warteschleifen. Schnelle, kompetente Hilfe bei technischen Fragen, per Telefon oder E-Mail."
  text2: "Branchenüblich bieten wir Installateuren einen Rabatt. Sprechen Sie uns an."
