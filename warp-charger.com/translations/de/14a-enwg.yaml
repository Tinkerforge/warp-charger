title: "§14a EnWG"
description: "§14a EnWG rechtskonform umsetzen mit WARP Charger: Steuerbare Verbrauchseinrichtung einfach konfiguriert."

badge: "§14a EnWG"
subtitle: "Rechtskonformität einfach umgesetzt"

intro:
  badge: "Gesetzliche Anforderung"
  headline: "Was ist §14a EnWG?"
  text: "§14a des Energiewirtschaftsgesetzes betrifft alle Verbrauchseinrichtungen mit einer Leistung ab 4,2 kW, insbesondere Wallboxen. Laut Gesetz muss ein WARP Charger jederzeit vom Netzbetreiber auf 4,2 kW gedrosselt werden können."
  text2: "Die Geräte werden dabei nie vollständig abgeschaltet. Eine Mindestleistung von 4.200 W bleibt stets verfügbar. Sind mehrere steuerbare Verbrauchseinrichtungen vorhanden, kann die Leistung frei verteilt werden."
  text3: "Im Gegenzug werden Nutzer mit steuerbaren Verbrauchseinrichtungen finanziell entlastet durch günstigere Netzentgelte."

modules:
  badge: "§14a Module"
  headline: "Drei Module zur Wahl"
  text: "Nutzer mit steuerbaren Verbrauchseinrichtungen können ein Modul wählen:"
  list:
    - title: "Modul 1: Pauschale Reduktion"
      icon: "payments"
      desc: "Das Netzentgelt wird pauschal für einen angenommenen fixen Stromverbrauch reduziert. Ein fixer Euro-Betrag wird jährlich gutgeschrieben, unabhängig vom eigenen Verbrauch. Keine zusätzliche Hardware nötig."
    - title: "Modul 2: 60% Reduktion"
      icon: "percent"
      desc: "Das Netzentgelt wird auf 40% reduziert. Technisch ist ein eigener Verbrauchszähler erforderlich. Vor allem für Verbraucher mit hohem Stromverbrauch interessant."
    - title: "Modul 3: Zeitvariable Netzentgelte"
      icon: "schedule"
      desc: 'Zusätzlich zur Pauschale sind Netzentgelte zeitvariabel in drei Stufen (Standard, Hochtarif, Niedrigtarif). Lohnt sich, wenn Verbrauch in Niedrigtarif-Zeiten verschoben werden kann. Der <a href="/de/loesungen/dynamische-strompreise" class="prose-link">WARP Eco-Modus</a> erledigt das automatisch.'

signals:
  badge: "Signalquellen"
  headline: "Steuerung durch den Netzbetreiber"
  text: "WARP Charger und Energy Manager unterstützen verschiedene Signalquellen für die Steuerung durch den Netzbetreiber:"
  list:
    - title: "Rundsteuerempfänger"
      icon: "radio"
      desc: 'Potentialfreier Kontakt am Abschalteingang der Wallbox oder an einem Eingang des <a href="/de/produkte/warp-energy-manager" class="prose-link">WARP Energy Managers</a>.'
    - title: "FNN-Steuerbox (Schaltausgang)"
      icon: "toggle_on"
      desc: "Wie Rundsteuerempfänger. Anschluss über potentialfreien Kontakt am WARP Charger oder Energy Manager."
    - title: "FNN-Steuerbox (EEBUS)"
      icon: "lan"
      desc: "Digitale Steuerung über das Netzwerk mittels EEBUS-Protokoll. Der WARP Charger und Energy Manager unterstützen EEBUS."
    - title: "API (HTTP/MQTT/Modbus/OCPP)"
      icon: "api"
      desc: "Die Steuerung durch den Netzbetreiber ist auch über andere verbreitete Schnittstellen wie HTTP, MQTT, Modbus TCP und OCPP möglich."

preparation:
  badge: "Vorbereitung"
  headline: "Anschluss vorbereiten"
  text: "Die meisten Netzbetreiber bieten aktuell weder Rundsteuerempfänger noch Steuerbox an. In diesem Fall genügt es oft, den WARP Charger per Ethernet oder WLAN mit dem Netzwerk zu verbinden."
  text2: "Wenn der Rollout beim Netzbetreiber stattfindet, kann die Steuerbox direkt zur Steuerung des WARP Chargers über das Netzwerk konfiguriert werden. Eine Abdeckung von 50% ist bis 2029 vorgesehen."
  highlight: "Empfehlung: Anschluss per Ethernet für zuverlässige Erreichbarkeit. Alternativ WLAN mit guter Verbindungsqualität."

doc_link:
  text: "Ausführliche Dokumentation"
  url: "https://docs.warp-charger.com/de/docs/tutorials/verbrauchseinrichtung"
