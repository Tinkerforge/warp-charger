title: "Bidirektionales Laden"
description: "Bidirektionales Laden mit dem WARP4 Charger Pro: aktueller Stand der Technik und unsere Vorbereitung auf ISO15118-20."

badge: "Bidirektionales Laden"
subtitle: "Vom E-Auto zurück ins Hausnetz und Stromnetz."

intro:
  badge: "Was ist bidirektionales Laden?"
  headline: "Strom fließt in beide Richtungen."
  diagram_aria: "Diagramm: Strom fließt vom E-Auto über die Wallbox zurück ins Stromnetz."
  diagram_labels:
    grid: "Stromnetz"
    wallbox: "WARP Charger"
    ev: "E-Auto"
  body_html: >
    Beim bidirektionalen Laden fließt Strom in beide Richtungen zwischen E-Auto und
    Hausnetz bzw. Stromnetz. Das Fahrzeug kann also nicht nur Strom laden, sondern auch
    wieder abgeben. Das E-Auto wird damit zum Stromspeicher für das Haus und das Stromnetz.
  variants_html: >
    Dabei ist zwischen bidirektionalem Gleichstrom- (DC) und Wechselstrom-Laden (AC) zu
    unterscheiden. Beim <strong>bidirektionalen DC-Laden</strong> wird direkt auf den
    Akku des Fahrzeugs zugegriffen. Der Wechselrichter zum Laden und Entladen ist dabei
    in der Wallbox bzw. Ladestation verbaut. Aus diesem Grund sind diese Lösungen teuer.
    Beim <strong>bidirektionalen AC-Laden</strong> ist die Lade- und Entladetechnik im
    Fahrzeug verbaut. Die Wallbox übernimmt nur die Kommunikation mit dem Fahrzeug.

status:
  badge: "Aktueller Stand"
  headline: "ISO15118-20 als Grundlage."
  body_html: >
    Technisch ist für das bidirektionale Laden der Ladestandard <strong>ISO15118-20</strong>
    notwendig. Dieser wird zurzeit sowohl für Wallboxen als auch bei den E-Fahrzeugen
    implementiert und ausgerollt. Insbesondere die erweiterte Sicherheitsarchitektur
    dieses Ladestandards mit Public-Key-Infrastruktur (PKI), digitalen Zertifikaten und
    Zertifikats-Pools bzw. Root-CAs erfordert Entwicklungsaufwand und einen externen
    Zertifizierungsprozess.
  open_questions_html: >
    Zusätzlich sind technische Details, wie der NA-Schutz, zurzeit für das bidirektionale
    AC-Laden noch nicht vollständig definiert. Neben der technischen Umsetzung der
    Ladeinfrastruktur sind für das flächendeckende Rollout weitere Faktoren wie die
    Einführung der intelligenten Messeinrichtungen notwendig.

warp:
  badge: "Bidirektionales Laden mit WARP"
  headline: "Hardware-seitig vorbereitet."
  body_html: >
    Die rechtlichen und technischen Rahmenbedingungen für das bidirektionale AC-Laden
    sind in Deutschland noch nicht vollständig geklärt. Sobald die Grundlagen stehen,
    werden wir bidirektionales Laden, sofern möglich, per Software-Update
    nachreichen.
  highlight_html: >
    Wir haben aber alles dafür getan, dass der
    <a href="/de/produkte/warp4-charger" class="prose-link"><strong>WARP4 Charger Pro</strong></a>
    mit der notwendigen Hardware ausgestattet ist, um diese Funktion zukünftig
    unterstützen zu können.
