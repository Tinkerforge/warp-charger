title: "WARP für zu Hause."
description: "Vollausstattung, offenes System, modular und kompakt: die WARP4 Wallbox für das Eigenheim."

badge: "WARP für zu Hause"
subtitle: "Die Wallbox für das Eigenheim."

fullsuite:
  badge: "Wallbox mit Vollausstattung"
  headline: "Alles drin, ab Werk."
  body_html: >
    WARP4 ist die Wallbox mit Vollausstattung. Sie ist kompatibel zu vielen anderen
    Geräten, besitzt ein integriertes
    <a href="/de/loesungen/pv-ueberschussladen" class="prose-link">PV-Überschussladen</a>,
    verbindet dieses mit
    <a href="/de/loesungen/dynamische-strompreise" class="prose-link">dynamischen Strompreisen</a>
    im Eco-Modus und kann sogar die Steuerung des Heimspeichers übernehmen.
  updates_html: >
    Regelmäßige kostenlose Software-Updates erweitern die Funktionen auch noch
    Jahre nach dem Kauf.

open:
  badge: "Offenes System"
  headline: "Unabhängig vom Hersteller-Ökosystem."
  body_html: >
    Viele andere Wallboxen sind an das Ökosystem des jeweiligen Herstellers gebunden.
    WARP geht den umgekehrten Weg und ist auf Kompatibilität zu anderen Systemen
    ausgelegt. So bleibt man unabhängig und ist nicht darauf angewiesen, auch
    zukünftig alle Komponenten eines spezifischen Herstellers nutzen zu müssen.
  hems_html: >
    Natürlich bietet WARP auch eine Vielzahl offener Schnittstellen, um sich in
    das eigene HEMS integrieren zu lassen.
  link_url: "/de/loesungen/maximale-kompatibilitaet#devices"
  link_label: "Kompatible Geräte"

compact:
  badge: "Klein und stylisch"
  headline: "Fügt sich ein, statt aufzutragen."
  body_html: >
    Mit nur <strong>280 × 215 × 95&nbsp;mm</strong> ist WARP4 sehr kompakt und
    integriert sich dank der wählbaren Frontblende mühelos in die Optik des jeweiligen
    Gebäudes.
  durability_html: >
    Die hochwertigen Komponenten sind UV-stabil und sehen auch nach längerer Zeit
    im Freien noch gut aus.

modular:
  badge: "Modular"
  headline: "Aufrüsten statt austauschen."
  body_html: >
    WARP ist modular aufgebaut. Wallboxen können nachträglich auf- und umgerüstet
    werden. Sollte einmal etwas defekt sein, lässt es sich einfach und kostengünstig
    reparieren.

apps:
  badge: "Apps für Android und iOS"
  headline: "Fernzugriff ohne Cloud-Zwang."
  body_html: >
    Wir verzichten, wo es geht, auf die Cloud. WARP arbeitet möglichst eigenständig.
    Natürlich soll der WARP Charger aber auch von unterwegs gesteuert werden können.
  remote_html: >
    Unsere Apps für Android und iOS nutzen unseren Fernzugriff. Die Kommunikation
    erfolgt dabei nicht über eine Cloud, sondern direkt zwischen App und WARP Charger.
  link_url: "/de/software/apps"
  link_label: "Mehr zu den Apps"
